// --- Chats inbox ------------------------------------------------------------
// A global view of every conversation, so the coach sees any note an athlete
// sends from their app in one place — not just buried in each athlete's detail.
let _chatMsgs = [], _chatNames = {};
function chatInitials(name) {
  const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return '?';
  return (parts[0][0] + (parts.length > 1 ? parts[parts.length - 1][0] : '')).toUpperCase();
}
async function loadChats() {
  $('content').innerHTML = '<div class="loading">Loading…</div>';
  renderTabbar('chats');
  const [msgRes, progRes, histRes] = await Promise.all([
    sb.from('messages').select('*').order('created_at', { ascending: true }),
    sb.from('athlete_progress').select('athlete_id, athlete_name'),
    sb.from('session_history').select('athlete_id, athlete_name')
  ]);
  if (msgRes.error) { $('content').innerHTML = `<p class="muted">Could not load messages: ${esc(msgRes.error.message)}</p>`; return; }
  _chatMsgs = msgRes.data || [];
  _chatNames = {};
  (progRes.data || []).concat(histRes.data || []).forEach(r => { if (r.athlete_name) _chatNames[r.athlete_id] = r.athlete_name; });
  // Resolve any still-unknown names from the program files (parallel).
  await Promise.all([...new Set(_chatMsgs.map(m => m.athlete_id))]
    .filter(id => !_chatNames[id])
    .map(id => fetch(`data/${id}.json`).then(r => r.ok ? r.json() : null).then(p => {
      if (p && p.athlete) { const nm = [p.athlete.firstName, p.athlete.lastName].filter(Boolean).join(' '); if (nm) _chatNames[id] = nm; }
    }).catch(() => {})));

  // Group rows (ascending) into one conversation per athlete; last row wins.
  const conv = {};
  _chatMsgs.forEach(m => {
    const c = conv[m.athlete_id] || (conv[m.athlete_id] = { id: m.athlete_id, last: null, unread: 0 });
    c.last = m;
    if (m.sender === 'athlete' && !m.read_by_coach) c.unread++;
  });
  _chatUnreadTotal = Object.values(conv).reduce((a, c) => a + c.unread, 0);
  renderTabbar('chats');

  const list = Object.values(conv).sort((a, b) =>
    ((b.unread > 0) - (a.unread > 0)) || String(b.last.created_at).localeCompare(String(a.last.created_at)));
  if (!list.length) {
    $('content').innerHTML = `<p class="muted">No messages yet. When an athlete sends you a note from their app, the conversation shows up here.</p>`;
    return;
  }
  $('content').innerHTML = list.map(c => {
    const name = _chatNames[c.id] || c.id;
    const preview = (c.last.sender === 'coach' ? 'You: ' : '') + (c.last.body || '');
    return `<div class="conv ${c.unread ? 'unread' : ''}" onclick="openChat('${esc(c.id)}')">
      <div class="conv-avatar">${esc(chatInitials(name))}</div>
      <div class="conv-body">
        <div class="conv-name">${esc(name)}</div>
        <div class="conv-preview">${c.unread ? '<b>' + esc(preview) + '</b>' : esc(preview)}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${esc(timeAgo(c.last.created_at))}</div>
        ${c.unread ? `<div class="conv-unread">${c.unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}
window.loadChats = loadChats;

// One conversation: thread + reply composer. Marks athlete messages read.
async function openChat(athleteId) {
  $('content').innerHTML = '<div class="loading">Loading…</div>';
  renderTabbar('chats');
  const { data, error } = await sb.from('messages').select('*')
    .eq('athlete_id', athleteId).order('created_at', { ascending: true });
  if (error) { $('content').innerHTML = `<p class="muted">Could not load chat: ${esc(error.message)}</p>`; return; }
  const msgs = data || [];
  const name = _chatNames[athleteId] || athleteId;
  _detailName = name;
  if (msgs.some(m => m.sender === 'athlete' && !m.read_by_coach)) {
    await sb.from('messages').update({ read_by_coach: true })
      .eq('athlete_id', athleteId).eq('sender', 'athlete').eq('read_by_coach', false);
  }
  const bubbles = msgs.map(m => {
    const coach = m.sender === 'coach';
    const tag = ctxLabel(m.context);
    return `<div class="cmsg ${coach ? 'coach' : 'ath'}">
      <div class="cmsg-bubble">${esc(m.body)}</div>
      <div class="cmsg-meta">${tag ? '<span class="cmsg-tag">' + esc(tag) + '</span> · ' : ''}${coach ? 'You' : esc(name)} · ${esc(timeAgo(m.created_at))}</div>
    </div>`;
  }).join('');
  $('content').innerHTML = `
    <span class="back" onclick="loadChats()">← All chats</span>
    <div class="chat-head">
      <div class="conv-avatar">${esc(chatInitials(name))}</div>
      <div>
        <h2 style="font-size:24px;margin-bottom:2px">${esc(name)}</h2>
        <div class="muted" style="cursor:pointer;color:var(--accent)" onclick="loadAthlete('${esc(athleteId)}')">View full profile →</div>
      </div>
    </div>
    <div class="chat-thread-card">
      ${msgs.length ? `<div class="cthread">${bubbles}</div>` : '<p class="chat-empty">No messages yet — say hello.</p>'}
      <div class="creply">
        <textarea id="chat-input" placeholder="Message ${esc(name)}…"></textarea>
        <button class="btn primary sm" onclick="chatSend('${esc(athleteId)}')">Send</button>
      </div>
    </div>`;
  const ta = $('chat-input'); if (ta) ta.focus();
}
window.openChat = openChat;

async function chatSend(athleteId) {
  const ta = $('chat-input');
  if (!ta) return;
  const body = ta.value.trim();
  if (!body) return;
  ta.value = '';
  const ins = await sb.from('messages').insert({ athlete_id: athleteId, sender: 'coach', body, context: null, read_by_athlete: false, read_by_coach: true });
  if (ins.error) { alert('Could not send: ' + ins.error.message); return; }
  openChat(athleteId);
}
window.chatSend = chatSend;

// --- finished-session card (email-style) ------------------------------------
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function prettyDate(iso) {           // 'YYYY-MM-DD' -> 'Mon 25 May 2026'
  if (!iso) return '';
  const p = String(iso).split('-');
  if (p.length !== 3) return iso;
  const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] || '';
  return `${dow} ${Number(p[2])} ${MONTHS[Number(p[1]) - 1]} ${p[0]}`;
}
// The stored `summary` is the full email body (meta + exercise log). We show
// meta in a clean table, so pull out just the "Exercise log:" section to avoid
// duplicating it. If the marker isn't found, fall back to the whole summary.
function exerciseLogPart(summary) {
  if (!summary) return '';
  const i = summary.indexOf('Exercise log:');
  const body = i >= 0 ? summary.slice(i + 'Exercise log:'.length) : summary;
  return body.replace(/^\s+/, '');
}
// Inner detail for ONE finished session: meta table, athlete note, reply panel,
// prescribed-vs-done comparison, exercise log, and a delete button. Rendered
// inside the per-day groups below.
function sessionBodyHtml(athleteId, s, programDays) {
  const rd = s.readiness;
  // Session load (AU) = session RPE × duration (Foster's method) — same figure
  // the email reports. Only meaningful when a duration was recorded.
  const auLoad = (s.session_rpe != null && s.duration_min != null)
    ? s.session_rpe * s.duration_min : null;

  let readinessRow = '';
  if (rd) {
    if (rd.skipped) readinessRow = `<tr><td class="k">Readiness</td><td class="v">skipped</td></tr>`;
    else {
      const parts = ['sleep','energy','soreness','stress','overall']
        .filter(k => rd[k] != null).map(k => `${k} ${rd[k]}`).join(' · ');
      readinessRow = `<tr><td class="k">Readiness</td><td class="v">${rd.composite != null ? esc(rd.composite) + '/5' : ''}${parts ? ' · ' + esc(parts) : ''}</td></tr>`;
    }
  }

  const meta = `<table class="meta-table">
    <tr><td class="k">Status</td><td class="v">${esc(s.status || 'sent')}</td></tr>
    ${s.session_rpe != null ? `<tr><td class="k">Session RPE</td><td class="v">${esc(s.session_rpe)}/10</td></tr>` : ''}
    ${s.duration_min != null ? `<tr><td class="k">Duration</td><td class="v">${esc(s.duration_min)} min</td></tr>` : ''}
    ${auLoad != null ? `<tr><td class="k">Session load</td><td class="v">${esc(auLoad)} AU <span style="color:var(--grey)">(RPE ${esc(s.session_rpe)} × ${esc(s.duration_min)} min)</span></td></tr>` : ''}
    ${readinessRow}
  </table>`;

  const elog = exerciseLogPart(s.summary);

  const uid = (athleteId + '_' + s.day + '_' + s.completed_on).replace(/[^a-z0-9]/gi, '_');
  const actions = sessionNeedsReply(s) ? `
    <div class="note-actions">
      <button class="btn sm primary" onclick="openSessionReply('${uid}')">Reply to note</button>
      <button class="btn sm" onclick="markNoteRead('${esc(athleteId)}', ${Number(s.day)}, '${esc(s.completed_on)}')">Mark read</button>
    </div>
    <div class="session-reply" id="sr-${uid}" style="display:none">
      <textarea id="srinput-${uid}" placeholder="Reply to ${esc(_detailName)}…"></textarea>
      <button class="btn sm primary" onclick="sendSessionReply('${uid}', '${esc(athleteId)}', ${Number(s.day)}, '${esc(s.completed_on)}')">Send reply</button>
    </div>` : '';

  return `${meta}
    ${s.day_note ? `<div class="note"><b>Athlete note:</b> ${esc(s.day_note)}</div>` : ''}
    ${actions}
    ${comparisonTableHtml(s, programDays)}
    ${elog ? `<div class="elog-title">Exercise log (as sent)</div><div class="elog-body">${esc(elog)}</div>` : ''}
    <div class="note-actions"><button class="btn sm danger" onclick="deleteSession('${esc(athleteId)}', ${Number(s.day)}, '${esc(s.completed_on)}')">Delete this log</button></div>`;
}

// Parse the "Exercise log" portion of a stored summary into a list of exercises
// with their per-set done flags. The emailed/stored format is:
//   [Block]
//   • Exercise Name (✓)            ← "(✓)" = done, otherwise a "missing" label
//       Set 1: 45 @7 ✓            ← trailing ✓ = that set done; "skipped" = not
// (Indentation may be stripped when pasted from an email, so we don't rely on it.)
function parseExerciseLog(summary) {
  const i = String(summary || '').indexOf('Exercise log:');
  if (i < 0) return [];
  const exs = [];
  let cur = null;
  String(summary).slice(i + 'Exercise log:'.length).split('\n').forEach(raw => {
    const line = raw.trim();
    if (!line || /^\[.*\]$/.test(line) || line.startsWith('·')) return;
    let m;
    if ((m = line.match(/^•\s*(.+?)\s*\(([^)]*)\)\s*$/))) {
      cur = { name: m[1].trim(), tag: m[2].trim(), done: m[2].trim() === '✓', sets: [] };
      exs.push(cur);
    } else if ((m = line.match(/^•\s*(.+)$/))) {
      cur = { name: m[1].trim(), tag: '', done: true, sets: [] };
      exs.push(cur);
    } else if (/^Set\s+\d+:/i.test(line)) {
      if (cur) cur.sets.push({ done: /✓/.test(line) });
    }
  });
  return exs;
}

// Compare a session's logged work against that day's prescribed program, so the
// coach can see at a glance what was skipped or only partly done.
function comparisonTableHtml(s, programDays) {
  const parsed = parseExerciseLog(s.summary);
  if (!parsed.length) return '';
  const norm = n => String(n || '').toLowerCase().replace(/\s+/g, ' ').trim();
  const logByName = {};
  parsed.forEach(e => { logByName[norm(e.name)] = e; });
  const pd = (programDays || []).find(p => Number(p.id) === Number(s.day));
  const prescribed = [];
  if (pd) (pd.blocks || []).forEach(b => (b.exercises || []).forEach(ex => prescribed.push(ex)));

  const loggedCell = e => {
    if (!e) return '<span style="color:var(--red)">— not logged</span>';
    const done = e.sets.filter(x => x.done).length, tot = e.sets.length;
    const lbl = e.tag && e.tag !== '✓' ? ' (' + esc(e.tag) + ')' : '';
    if (!e.done) {
      return done > 0
        ? `<span style="color:var(--amber)">partial${tot ? ' ' + done + '/' + tot + ' sets' : ''}${lbl}</span>`
        : `<span style="color:var(--red)">skipped${lbl}</span>`;
    }
    if (tot && done < tot) return `<span style="color:var(--amber)">${done}/${tot} sets</span>`;
    return `<span style="color:var(--green)">✓${tot ? ' ' + done + '/' + tot + ' sets' : ''}</span>`;
  };

  const rows = [];
  let skipped = 0;
  const seen = new Set();
  if (prescribed.length) {
    prescribed.forEach(ex => {
      const e = logByName[norm(ex.name)];
      seen.add(norm(ex.name));
      if (!e || !e.done) skipped++;
      const presc = (ex.chips || []).map(c => c.label).join(' · ') || '—';
      rows.push(`<tr><td>${esc(ex.name)}</td><td class="muted">${esc(presc)}</td><td>${loggedCell(e)}</td></tr>`);
    });
    parsed.forEach(e => {
      if (!seen.has(norm(e.name)))
        rows.push(`<tr><td>${esc(e.name)} <span style="color:var(--grey)">· not in plan</span></td><td class="muted">—</td><td>${loggedCell(e)}</td></tr>`);
    });
  } else {
    parsed.forEach(e => { if (!e.done) skipped++; rows.push(`<tr><td>${esc(e.name)}</td><td class="muted">—</td><td>${loggedCell(e)}</td></tr>`); });
  }
  const tag = skipped
    ? `<span style="color:var(--red)">${skipped} skipped/partial</span>`
    : `<span style="color:var(--green)">all prescribed work done</span>`;
  const note = prescribed.length ? '' : ' <span class="muted">(no program file — showing what was logged)</span>';
  return `<div class="elog-title" style="margin-top:18px">Prescribed vs done · ${tag}${note}</div>
    <table><tr><th>Exercise</th><th>Prescribed</th><th>Logged</th></tr>${rows.join('')}</table>`;
}

// Group every finished session by its program day, newest first within each day.
// Each day is a collapsed toggle showing its LATEST session in full, with any
// earlier completions of that same day nested beneath — so the coach can open
// "Day 4" or "Day 2" and read exactly what was logged last time.
function renderLogsByDay(athleteId, history, programDays) {
  if (!history.length) return '<p class="muted">No finished sessions yet — these appear the moment an athlete taps Finish on a day (full or partial).</p>';
  const byDay = {};
  history.forEach(s => { (byDay[s.day] = byDay[s.day] || []).push(s); });
  Object.values(byDay).forEach(arr => arr.sort((a, b) => String(b.completed_on).localeCompare(String(a.completed_on))));
  // Order day groups by the program's day order, with any extras after.
  const order = (programDays || []).map(d => Number(d.id));
  const dayNums = Object.keys(byDay).map(Number).sort((a, b) => {
    const ia = order.indexOf(a), ib = order.indexOf(b);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return a - b;
  });
  return dayNums.map(d => {
    const sessions = byDay[d];
    const latest = sessions[0];
    const pd = (programDays || []).find(p => Number(p.id) === d);
    const focus = latest.focus || (pd && pd.focusTag) || '';
    const partial = isPartialStatus(latest.status);
    const earlier = sessions.slice(1);
    const needsReply = sessions.some(sessionNeedsReply);
    return `<details class="day-c">
      <summary>
        <div class="day-c-main">
          <h3>Day ${esc(d)}${focus ? ' — ' + esc(focus) : ''}${needsReply ? ' <span class="zpill reply" style="vertical-align:middle">note to reply</span>' : ''}</h3>
          <div class="day-date">Last done ${esc(prettyDate(latest.completed_on))} · ${partial ? 'Partial' : 'Complete'}${latest.session_rpe != null ? ' · RPE ' + esc(latest.session_rpe) + '/10' : ''}${sessions.length > 1 ? ' · ' + sessions.length + ' logged' : ''}</div>
        </div>
        <span class="day-c-chev">▾</span>
      </summary>
      <div class="day-c-body">
        ${sessionBodyHtml(athleteId, latest, programDays)}
        ${earlier.length ? `<div class="elog-title" style="margin-top:20px">Earlier sessions of this day</div>
          ${earlier.map(s => `<details class="day-c" style="margin-bottom:8px">
            <summary><div class="day-c-main"><h3 style="font-size:15px">${esc(prettyDate(s.completed_on))} · ${isPartialStatus(s.status) ? 'Partial' : 'Complete'}${s.session_rpe != null ? ' · RPE ' + esc(s.session_rpe) + '/10' : ''}</h3></div><span class="day-c-chev">▾</span></summary>
            <div class="day-c-body">${sessionBodyHtml(athleteId, s, programDays)}</div>
          </details>`).join('')}` : ''}
      </div>
    </details>`;
  }).join('');
}

// --- import a past session from a coach email -------------------------------
// The Web3Forms session-report email contains the same human-readable summary
// the app stores. Paste it here to backfill a session_history row (e.g. for
// sessions sent before the cloud fix). Parses day / status / RPE / duration /
// readiness / note + the full summary; the COACH supplies the date (the email
// body doesn't carry it). Saved via the existing key-checked save_session RPC.
function parseSessionEmail(text) {
  const t = String(text || '').replace(/\r/g, '');
  // Canonical summary = the "Full summary" block if present, else the whole text.
  const fs = t.indexOf('Full summary');
  let summary = (fs >= 0 ? t.slice(fs + 'Full summary'.length) : t).replace(/^\s*\n/, '').trim();
  if (summary.indexOf('Exercise log:') < 0 && t.indexOf('Exercise log:') >= 0) summary = t.trim();

  const firstLine = (summary.split('\n')[0] || '');
  const dm = firstLine.match(/Day\s+(\d+)\s*[—–-]?\s*(.*)$/) || t.match(/Day\s+(\d+)\s*[—–-]?\s*([^\n]*)/);
  const day = dm ? Number(dm[1]) : null;
  const focus = dm && dm[2] ? dm[2].trim() : '';

  const grab = re => { const m = t.match(re); return m ? m[1].trim() : ''; };
  const status = grab(/Status:?\s*\n?\s*([^\n]+)/) || 'Complete';
  const rpeM = t.match(/Session RPE:?\s*\n?\s*(\d+(?:\.\d+)?)/i);
  const durM = t.match(/Duration:?\s*\n?\s*(\d+)/i);
  let note = grab(/Notes from athlete\s*\n\s*([^\n]+)/) || grab(/Notes from athlete:\s*\n\s*([^\n]+)/);
  if (/^\(?none\)?$/i.test(note)) note = '';

  // Readiness: prefer the one-line "Composite x/5 · Sleep n · …" field; else the
  // per-question lines inside the summary.
  let readiness = null;
  const oneLine = t.match(/Composite\s+([\d.]+)\/5\s*·\s*Sleep\s+(\d+)\s*·\s*Energy\s+(\d+)\s*·\s*Soreness\s+(\d+)\s*·\s*Stress\s+(\d+)\s*·\s*Overall\s+(\d+)/i);
  if (oneLine) {
    readiness = { composite: Number(oneLine[1]), sleep: +oneLine[2], energy: +oneLine[3], soreness: +oneLine[4], stress: +oneLine[5], overall: +oneLine[6] };
  } else if (/Readiness[^\n]*skipped/i.test(t)) {
    readiness = { skipped: true };
  } else {
    const comp = t.match(/composite\s+([\d.]+)\/5/i);
    const q = (re) => { const m = t.match(re); return m ? +m[1] : null; };
    const sleep = q(/sleep last night:?\s*(\d+)/i), energy = q(/energy levels[^:]*:?\s*(\d+)/i),
          soreness = q(/sore[^:]*:?\s*(\d+)/i), stress = q(/stress[^:]*:?\s*(\d+)/i), overall = q(/ready do you feel:?\s*(\d+)/i);
    if (comp || sleep || energy || soreness || stress || overall) {
      readiness = { composite: comp ? Number(comp[1]) : null, sleep, energy, soreness, stress, overall };
    }
  }

  return {
    day, focus, status,
    session_rpe: rpeM ? rpeM[1] : '',
    duration_min: durM ? durM[1] : '',
    readiness, day_note: note, summary
  };
}

let _pendingImport = null;
function toggleAddSession() {
  const el = $('add-session');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function parseAndFillSession() {
  const ta = $('as-paste');
  if (!ta) return;
  _pendingImport = parseSessionEmail(ta.value);
  const p = _pendingImport;
  const r = p.readiness;
  const rTxt = !r ? '—' : r.skipped ? 'skipped' : `${r.composite != null ? r.composite + '/5' : ''}`;
  $('as-preview').innerHTML = !p.day
    ? '<span style="color:var(--red)">Couldn\'t find a "Day N" line — paste the full email (including the Full summary block).</span>'
    : `<table class="meta-table">
        <tr><td class="k">Day</td><td class="v">Day ${esc(p.day)}${p.focus ? ' — ' + esc(p.focus) : ''}</td></tr>
        <tr><td class="k">Status</td><td class="v">${esc(p.status)}</td></tr>
        <tr><td class="k">Session RPE</td><td class="v">${esc(p.session_rpe || '—')}</td></tr>
        <tr><td class="k">Duration</td><td class="v">${esc(p.duration_min || '—')}${p.duration_min ? ' min' : ''}</td></tr>
        <tr><td class="k">Readiness</td><td class="v">${esc(rTxt)}</td></tr>
        <tr><td class="k">Exercises</td><td class="v">${parseExerciseLog(p.summary).length} logged</td></tr>
      </table>`;
  $('as-save').disabled = !p.day;
}
async function submitPastSession(athleteId) {
  if (!_pendingImport || !_pendingImport.day) { alert('Paste an email and tap "Read email" first.'); return; }
  const dateEl = $('as-date');
  const completedOn = dateEl && dateEl.value;
  if (!completedOn) { alert('Pick the date this session was done (from the email).'); return; }
  const p = _pendingImport;
  const btn = $('as-save'); if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  // The coach can call the athlete's own key-checked writer; fetch their key.
  const keyRes = await sb.from('athlete_keys').select('secret_key').eq('athlete_id', athleteId).maybeSingle();
  const key = keyRes.data && keyRes.data.secret_key;
  const { error } = await sb.rpc('save_session', {
    p_athlete_id: athleteId,
    p_athlete_name: _detailName,
    p_day: Number(p.day),
    p_completed_on: completedOn,
    p_session: {
      status: p.status || 'Complete',
      session_rpe: String(p.session_rpe || ''),
      duration_min: String(p.duration_min || ''),
      readiness: p.readiness || null,
      day_note: p.day_note || '',
      focus: p.focus || '',
      summary: p.summary
    },
    p_key: key || null
  });
  if (error) { alert('Could not save: ' + error.message); if (btn) { btn.disabled = false; btn.textContent = 'Save to logs'; } return; }
  _pendingImport = null;
  loadAthlete(athleteId);
}
window.toggleAddSession = toggleAddSession;
window.parseAndFillSession = parseAndFillSession;
window.submitPastSession = submitPastSession;

// --- coach messaging (reply panel) ------------------------------------------
let _detailName = '', _detailHistory = [];
function sessionMsgPanel(athleteId, msgs) {
  const bubbles = msgs.map(m => {
    const coach = m.sender === 'coach';
    const tag = ctxLabel(m.context);
    return `<div class="cmsg ${coach ? 'coach' : 'ath'}">
      <div class="cmsg-bubble">${esc(m.body)}</div>
      <div class="cmsg-meta">${tag ? '<span class="cmsg-tag">' + esc(tag) + '</span> · ' : ''}${coach ? 'You' : esc(_detailName)}</div>
    </div>`;
  }).join('');
  const body = msgs.length
    ? `<div class="cthread">${bubbles}</div>
       <div class="creply">
         <textarea id="coach-msg-input" placeholder="Message ${esc(_detailName)}…"></textarea>
         <button class="btn primary sm" onclick="coachSend('${esc(athleteId)}')">Send</button>
       </div>`
    : `<p class="muted" style="margin:0">No conversation yet. Use “Reply to note” on a finished session below to start one — only the notes you reply to appear here.</p>`;
  return `<div class="msg-card"><div class="sec-title" style="margin-top:0">Messages</div>${body}</div>`;
}
async function coachSend(athleteId) {
  const ta = document.getElementById('coach-msg-input');
  if (!ta) return;
  const body = ta.value.trim();
  if (!body) return;
  const ins = await sb.from('messages').insert({ athlete_id: athleteId, sender: 'coach', body, context: null, read_by_athlete: false, read_by_coach: true });
  if (ins.error) { alert('Could not send: ' + ins.error.message); return; }
  await sb.from('messages').update({ read_by_coach: true }).eq('athlete_id', athleteId).eq('sender', 'athlete').eq('read_by_coach', false);
  loadAthlete(athleteId);
}
function openSessionReply(uid) {
  const el = document.getElementById('sr-' + uid);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
  const ta = document.getElementById('srinput-' + uid);
  if (ta && el.style.display !== 'none') ta.focus();
}
async function sendSessionReply(uid, athleteId, day, completedOn) {
  const ta = document.getElementById('srinput-' + uid);
  if (!ta) return;
  const reply = ta.value.trim();
  if (!reply) return;
  const s = _detailHistory.find(x => Number(x.day) === Number(day) && x.completed_on === completedOn);
  const noteText = s ? sessionNoteText(s) : '';
  const ctx = 'session:' + day + ':' + completedOn;
  const rows = [];
  if (noteText) rows.push({ athlete_id: athleteId, sender: 'athlete', body: noteText, context: ctx, read_by_athlete: true, read_by_coach: true });
  rows.push({ athlete_id: athleteId, sender: 'coach', body: reply, context: ctx, read_by_athlete: false, read_by_coach: true });
  const ins = await sb.from('messages').insert(rows);
  if (ins.error) { alert('Could not send: ' + ins.error.message); return; }
  await sb.from('session_history').update({ coach_status: 'replied' }).eq('athlete_id', athleteId).eq('day', day).eq('completed_on', completedOn);
  loadAthlete(athleteId);
}
async function markNoteRead(athleteId, day, completedOn) {
  const { error } = await sb.from('session_history').update({ coach_status: 'read' }).eq('athlete_id', athleteId).eq('day', day).eq('completed_on', completedOn);
  if (error) { alert('Could not update: ' + error.message); return; }
  loadAthlete(athleteId);
}
window.coachSend = coachSend;
window.openSessionReply = openSessionReply;
window.sendSessionReply = sendSessionReply;
window.markNoteRead = markNoteRead;

// --- athlete detail ---------------------------------------------------------
async function loadAthlete(athleteId) {
  $('content').innerHTML = '<div class="loading">Loading…</div>';
  renderTabbar('athletes');
  const [progRes, histRes, keyRes, msgRes, callRes] = await Promise.all([
    sb.from('athlete_progress').select('*').eq('athlete_id', athleteId).maybeSingle(),
    sb.from('session_history').select('*').eq('athlete_id', athleteId)
      .order('completed_on', { ascending: false }).order('day', { ascending: true }),
    sb.from('athlete_keys').select('secret_key').eq('athlete_id', athleteId).maybeSingle(),
    sb.from('messages').select('*').eq('athlete_id', athleteId).order('created_at', { ascending: true }),
    sb.from('call_logs').select('*').eq('athlete_id', athleteId).order('call_date', { ascending: false })
  ]);
  if (progRes.error && histRes.error) {
    $('content').innerHTML = `<p class="muted">Error: ${esc((progRes.error || histRes.error).message)}</p>`; return;
  }
  const prog       = progRes.data;            // may be null if they only have history
  const history    = histRes.data || [];
  const messages   = (msgRes && msgRes.data) || [];
  const callLogs   = (callRes && callRes.data) || [];
  const key        = keyRes.data && keyRes.data.secret_key;
  let   name       = (prog && prog.athlete_name) || (history[0] && history[0].athlete_name) || athleteId;
  const lastActive = (prog && prog.updated_at) || (history[0] && history[0].updated_at) || null;

  // The athlete's program file (same data/<id>.json the app uses): gives the
  // prescribed plan, sessions/week for adherence, and the day list for grouping.
  // The exercise library resolves video URLs by name, exactly like program.html.
  let program = null;
  try { const pr = await fetch(`data/${athleteId}.json`); if (pr.ok) program = await pr.json(); } catch (e) {}
  const lib = await exLib();
  const programDays = (program && program.workouts && program.workouts.days) || [];
  if (program && program.athlete && name === athleteId) {
    name = [program.athlete.firstName, program.athlete.lastName].filter(Boolean).join(' ') || athleteId;
  }
  _detailName = name; _detailHistory = history;   // needed before histHtml builds the session cards
  const metrics    = athleteMetrics(history, lastActive, programDays.length);   // load, readiness, adherence

  // Secure-link panel (Stage 2 / Path B)
  const link = key ? secureLink(athleteId, key) : '';
  const linkHtml = key
    ? `<div class="note" style="border-left-color:var(--green)">
         <div style="margin-bottom:8px"><b>🔒 Secure link</b> — only this link can sync ${esc(name)}'s data.</div>
         <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
           <input readonly value="${esc(link)}" onclick="this.select()" style="flex:1;min-width:240px;font-family:'Space Mono',monospace;font-size:12px;padding:8px;border:1px solid var(--line);border-radius:8px">
           <button class="btn sm" onclick="copyText('${esc(link)}', this)">Copy link</button>
           <button class="btn sm danger" onclick="if(confirm('Rotate the key? The OLD link will stop syncing immediately and you must send ${esc(name)} the new one.')) protectAthlete('${esc(athleteId)}')">Rotate key</button>
         </div>
       </div>`
    : `<div class="note">
         <div style="margin-bottom:8px"><b>⚠ Legacy link</b> — anyone with ${esc(name)}'s plain link can write to their record. Generate a secure link to lock it down.</div>
         <button class="btn sm primary" onclick="protectAthlete('${esc(athleteId)}')">Generate secure link</button>
       </div>`;

  // ── Permanent finished sessions (captured on Finish; never degrade) ──
  // Rendered like the original coach email: each completion is its own dated
  // entry (full OR partial), with the full meta + exercise log laid out openly.
  const histHtml = renderLogsByDay(athleteId, history, programDays);

  // ── Live activity (rolling snapshot; may be partial / cleared on rollover) ──
  // The snapshot stores exercise logs keyed by exercise NAME only (no day), so
  // to group each exercise under its day we use the program file loaded above
  // (data/<id>.json) and map name → day.
  const { days, ex } = prog ? decode(athleteId, prog.data) : { days: {}, ex: {} };

  // exercise slug (name with spaces→_) → that exercise's logged data
  const exForName = (name) => ex[String(name).replace(/\s+/g, '_')];
  const setStr = (e) => (e.sets || []).map(s => {
    const bits = [s.w, s.r ? '@' + s.r : ''].filter(Boolean).join(' ');
    return (bits || '·') + (s.d ? ' ✓' : '');
  }).join(' · ');
  const hasData = (e) => e && ((e.sets && e.sets.some(s => s.w || s.r || s.d)) || e.note || e.rpe);

  // Build one card per program day, with that day's exercises grouped beneath it.
  let daysHtml = '';
  if (programDays.length) {
    daysHtml = programDays.map(pd => {
      const d = days[pd.id] || {};
      const rd = d.readiness;
      let readinessHtml = '';
      if (rd) {
        if (rd.skipped) readinessHtml = '<div class="readiness"><span class="r">Readiness: <b>skipped</b></span></div>';
        else readinessHtml = `<div class="readiness">
          ${rd.composite != null ? `<span class="r">Readiness <b>${esc(rd.composite)}/5</b></span>` : ''}
          ${['sleep','energy','soreness','stress','overall'].filter(k=>rd[k]!=null).map(k=>`<span class="r">${k} <b>${esc(rd[k])}</b></span>`).join('')}
        </div>`;
      }
      // exercises for this day, in program order, that actually have logs
      const rows = [];
      (pd.blocks || []).forEach(block => (block.exercises || []).forEach(exr => {
        const e = exForName(exr.name);
        if (hasData(e)) rows.push({ name: exr.name, sets: setStr(e), rpe: e.rpe, note: e.note });
      }));
      const exTable = rows.length ? `<table>
        <tr><th>Exercise</th><th>Sets logged (wt @ RPE)</th><th>Note</th></tr>
        ${rows.map(r => `<tr><td>${esc(r.name)}</td><td class="num">${esc(r.sets) || (r.rpe ? 'RPE ' + esc(r.rpe) : '—')}</td><td>${esc(r.note || '')}</td></tr>`).join('')}
      </table>` : '<p class="muted" style="margin-top:8px">No exercise logs recorded for this day yet.</p>';

      const touched = d.completed || d.srpe || d.note || rd || rows.length;
      return `<div class="day">
        <div class="day-head">
          <h3>Day ${esc(pd.id)}${pd.focusTag ? ' — ' + esc(pd.focusTag) : ''}
            ${d.completed ? '<span class="tag done">✓ Completed</span>' : (touched ? '<span class="tag">In progress</span>' : '<span class="tag" style="opacity:.6">Not started</span>')}
            <span class="when">${d.completedOn ? '· ' + esc(d.completedOn) : ''}${d.srpe ? ' · session RPE ' + esc(d.srpe) + '/10' : ''}</span></h3>
        </div>
        ${readinessHtml}
        ${d.note ? `<div class="note"><b>Athlete note:</b> ${esc(d.note)}</div>` : ''}
        ${exTable}
      </div>`;
    }).join('');
  } else {
    // Fallback: no program file — flat list (old behaviour) so nothing is lost.
    const exNames = Object.keys(ex).filter(k => hasData(ex[k]));
    daysHtml = exNames.length ? `<div class="day"><table>
      <tr><th>Exercise</th><th>Sets logged (wt @ RPE)</th><th>Note</th></tr>
      ${exNames.map(k => `<tr><td>${esc(unslug(k))}</td><td class="num">${esc(setStr(ex[k])) || (ex[k].rpe ? 'RPE ' + esc(ex[k].rpe) : '—')}</td><td>${esc(ex[k].note || '')}</td></tr>`).join('')}
    </table></div>` : '<p class="muted">No live day data.</p>';
  }

  // ── Prescribed program (read-only): the current cycle's plan, with a subtle
  // "Last logged" line under any exercise the athlete has actually logged. ──
  const cycles = (program && program.cycles) || [];
  const ci = (program && Number.isInteger(program.currentCycleIndex)) ? program.currentCycleIndex : 0;
  const cyc = cycles[ci];
  const cycleHead = cyc ? `<div class="prog-cycle">
      <div class="prog-cycle-name">${esc(cyc.name || '')}${cyc.weeks ? ' · ' + esc(cyc.weeks) : ''}</div>
      ${cyc.focuses && cyc.focuses.length ? `<ul class="prog-focus">${cyc.focuses.map(f => `<li>${esc(f)}</li>`).join('')}</ul>` : ''}
    </div>` : '';
  const progBody = programDays.length ? programDays.map(pd => {
    const blocks = (pd.blocks || []).map(b => {
      const exs = (b.exercises || []).map(pex => {
        const lg = exForName(pex.name);
        const logged = hasData(lg)
          ? `<div class="logline">Last logged: ${esc(setStr(lg)) || (lg.rpe ? 'RPE ' + esc(lg.rpe) : '—')}${lg.note ? ' · ' + esc(lg.note) : ''}</div>` : '';
        const v = vidUrl(pex, lib);
        const items = (pex.items && pex.items.length)
          ? `<div class="pex-items">${pex.items.map(it => `· ${esc(it.name)}${it.detail ? ' (' + esc(it.detail) + ')' : ''}`).join('<br>')}</div>` : '';
        return `<div class="pex">
            <div class="pex-top"><span class="pex-name">${esc(pex.name)}</span>${v ? `<a class="pex-vid" href="${esc(v)}" target="_blank" rel="noopener">▶ video</a>` : ''}</div>
            ${chipsHtml(pex.chips)}${items}${logged}
          </div>`;
      }).join('');
      return `<div class="pblock"><div class="pblock-title">${b.icon ? esc(b.icon) + ' ' : ''}${esc(b.title || '')}</div>${exs}</div>`;
    }).join('');
    return `<details class="day-c"><summary><div class="day-c-main"><h3>Day ${esc(pd.id)}${pd.focusTag ? ' — ' + esc(pd.focusTag) : ''}</h3></div><span class="day-c-chev">▾</span></summary><div class="day-c-body">${blocks}</div></details>`;
  }).join('') : `<p class="muted">No program file found for this athlete (looked for data/${esc(athleteId)}.json).</p>`;
  const programSection = `<div class="sec-title">Prescribed program — current cycle</div>${cycleHead}${progBody}`;

  // ── Weekly check-in call logs (coach-authored in call-log.html) ──
  const stars = n => n ? '★'.repeat(n) : '—';
  const callLogsBody = callLogs.length ? callLogs.map(l => {
    const s = l.scores || {};
    const ans = l.answers || {};
    const meta = [l.week, l.tier, l.duration].filter(Boolean).join(' · ');
    const scoreBits = [['Well',s.well],['Sleep',s.sleep],['Energy',s.energy],['Sore',s.sore],['RPE',s.rpe],['Court',s.court]]
      .filter(([,v]) => v != null).map(([k,v]) => `${k} <b>${esc(v)}</b>`).join(' · ');
    const ansHtml = Object.values(ans).map(a => `<div class="note" style="margin-top:6px"><b>${esc(a.label)}:</b> ${esc(a.value)}</div>`).join('');
    return `<details class="day-c"><summary><div class="day-c-main">
        <h3>${esc(l.call_date)} <span class="when">${meta ? '· ' + esc(meta) : ''} · call ${esc(stars(l.rating))}</span></h3>
      </div><span class="day-c-chev">▾</span></summary>
      <div class="day-c-body">
        <div class="readiness">${scoreBits ? `<span class="r">${scoreBits}</span>` : ''}${(l.sessions_done!=null||l.sessions_planned!=null)?`<span class="r">Sessions <b>${esc(l.sessions_done??'?')}/${esc(l.sessions_planned??'?')}</b></span>`:''}</div>
        ${l.win_vault ? `<div class="note" style="border-left-color:var(--green);margin-top:6px"><b>🏆 Win vault:</b> ${esc(l.win_vault)}</div>` : ''}
        ${ansHtml}
        <div style="margin-top:10px"><button class="btn sm danger" onclick="deleteCallLog('${esc(l.id)}','${esc(athleteId)}','${esc(l.call_date)}')">Delete</button></div>
      </div></details>`;
  }).join('') : '<p class="muted">No call logs yet.</p>';
  const callLogsSection = `<div class="sec-title" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <span>Weekly check-in calls</span>
      <a class="btn sm primary" href="call-log.html?athlete=${encodeURIComponent(athleteId)}" style="text-decoration:none">+ New call log</a>
    </div>${callLogsBody}`;

  $('content').innerHTML = `<span class="back" onclick="loadOverview()">← All athletes</span>
    <div class="day-head" style="align-items:center;margin-bottom:8px">
      <div>
        <h2 style="font-size:26px;margin-bottom:4px">${esc(name)}</h2>
        <div class="muted">last active ${timeAgo(lastActive)} · ${history.length} finished session${history.length === 1 ? '' : 's'}</div>
      </div>
      <button class="btn sm danger" onclick="deleteAthlete('${esc(athleteId)}', '${esc(name)}')">Delete all data</button>
    </div>
    ${linkHtml}
    ${renderCharts(metrics)}
    ${callLogsSection}
    ${programSection}
    <div class="sec-title" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <span>Training logs by day — last session of each day</span>
      <button class="btn sm" onclick="toggleAddSession()">+ Add past session from email</button>
    </div>
    <div id="add-session" class="add-session" style="display:none">
      <p class="muted" style="margin-bottom:10px">Paste a session-report email below, set the date it was done, then save. It's written exactly like a live finish (and compared to the program).</p>
      <textarea id="as-paste" placeholder="Paste the whole email here…"></textarea>
      <div class="add-session-row">
        <label>Date done <input type="date" id="as-date" value="${new Date().toISOString().slice(0,10)}"></label>
        <button class="btn sm" onclick="parseAndFillSession()">Read email</button>
        <button class="btn sm primary" id="as-save" onclick="submitPastSession('${esc(athleteId)}')" disabled>Save to logs</button>
      </div>
      <div id="as-preview" class="add-session-preview"></div>
    </div>
    ${histHtml}
    <div class="sec-title">Live activity — current snapshot (each day with its own logs)</div>${daysHtml}`;
}

// --- delete (coach only; enforced by RLS) -----------------------------------
async function deleteSession(athleteId, day, completedOn) {
  if (!confirm(`Delete the Day ${day} log from ${completedOn}?\n\nThis permanently removes that finished session. It cannot be undone.`)) return;
  const { error } = await sb.from('session_history').delete()
    .eq('athlete_id', athleteId).eq('day', day).eq('completed_on', completedOn);
  if (error) { alert('Could not delete: ' + error.message); return; }
  loadAthlete(athleteId);
}
async function deleteAthlete(athleteId, name) {
  if (!confirm(`Delete ALL data for ${name}?\n\nThis removes every finished session AND the live snapshot. It cannot be undone.`)) return;
  const r1 = await sb.from('session_history').delete().eq('athlete_id', athleteId);
  const r2 = await sb.from('athlete_progress').delete().eq('athlete_id', athleteId);
  if (r1.error || r2.error) { alert('Could not delete: ' + ((r1.error || r2.error).message)); return; }
  loadOverview();
}
async function deleteCallLog(id, athleteId, callDate) {
  if (!confirm(`Delete the call log from ${callDate}?\n\nThis permanently removes that weekly check-in. It cannot be undone.`)) return;
  const { error } = await sb.from('call_logs').delete().eq('id', id);
  if (error) { alert('Could not delete: ' + error.message); return; }
  loadAthlete(athleteId);
}
window.deleteCallLog = deleteCallLog;
window.deleteSession = deleteSession;
window.deleteAthlete = deleteAthlete;
window.loadAthlete = loadAthlete;
window.loadOverview = loadOverview;
</script>
