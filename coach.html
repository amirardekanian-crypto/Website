<!DOCTYPE html>
<!--
  COACH DASHBOARD (Stage 1)
  Private view of athlete progress, synced from program.html.
  Access: Google sign-in, locked to the coach email (client check here +
  Row Level Security in the database is the real gate).
  Data source: Supabase table public.athlete_progress — each row holds one
  athlete's whole localStorage as a JSON blob in `data`, decoded below.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#FAF7F2">
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #FAF7F2; --card: #FFFFFF; --ink: #1A1A1A; --grey: #6B6B6B;
    --line: #E7E2D9; --yellow: #E8B84B; --on-accent: #1A1A1A;
    --green: #3A8F5E; --red: #C0563B; --blue: #2F6DB0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; }
  h1, h2, h3 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: .5px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; gap: 12px; flex-wrap: wrap; }
  .topbar h1 { font-size: 30px; }
  .topbar .who { font-size: 13px; color: var(--grey); }
  .btn { font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 600; border: 1px solid var(--line);
         background: var(--card); color: var(--ink); padding: 9px 16px; border-radius: 10px; cursor: pointer; }
  .btn:hover { border-color: var(--ink); }
  .btn.primary { background: var(--yellow); border-color: var(--yellow); color: var(--on-accent); }
  .btn.sm { padding: 4px 11px; font-size: 12px; border-radius: 8px; }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { border-color: var(--red); background: #FBEAE4; }
  .day-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .day-head h3 { flex: 1; min-width: 0; }

  .gate { max-width: 420px; margin: 12vh auto; text-align: center; background: var(--card);
          border: 1px solid var(--line); border-radius: 16px; padding: 40px 32px; }
  .gate h1 { font-size: 32px; margin-bottom: 8px; }
  .gate p { color: var(--grey); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  .gate .err { color: var(--red); font-size: 13px; margin-top: 16px; min-height: 18px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; cursor: pointer; transition: border-color .15s, transform .15s; }
  .card:hover { border-color: var(--ink); transform: translateY(-2px); }
  .card .name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; text-transform: uppercase; }
  .card .meta { font-size: 12px; color: var(--grey); margin-top: 2px; }
  .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin-top: 12px; }
  .pill.active { background: #E7F4EC; color: var(--green); }
  .pill.quiet  { background: #FBEAE4; color: var(--red); }
  .stats { display: flex; gap: 18px; margin-top: 14px; }
  .stat .n { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
  .stat .l { font-size: 10px; text-transform: uppercase; color: var(--grey); letter-spacing: .5px; }

  .back { font-size: 13px; color: var(--blue); cursor: pointer; margin-bottom: 16px; display: inline-block; }
  .sec-title { font-size: 16px; color: var(--grey); margin: 26px 0 12px; }
  .day { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; }
  .day h3 { font-size: 18px; }
  .day .when { font-size: 12px; color: var(--grey); font-weight: 400; text-transform: none; font-family: 'Barlow', sans-serif; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; color: var(--grey); letter-spacing: .5px; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  td { padding: 7px 8px; border-bottom: 1px solid #F2EEE7; vertical-align: top; }
  td.num { font-family: 'Space Mono', monospace; white-space: nowrap; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #F2EEE7; }
  .tag.done { background: #E7F4EC; color: var(--green); }
  .note { background: #FBF8F1; border-left: 3px solid var(--yellow); padding: 9px 12px; border-radius: 6px; margin-top: 10px; font-size: 13px; }
  .readiness { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }
  .readiness .r { font-size: 12px; color: var(--grey); } .readiness .r b { font-family: 'Space Mono', monospace; color: var(--ink); }
  .muted { color: var(--grey); font-size: 13px; }
  .loading { text-align: center; color: var(--grey); padding: 60px 0; }

  /* Email-style finished-session card */
  .day-date { font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 13px; color: var(--ink); text-transform: none; margin-top: 3px; }
  .tag.partial { background: #FBEFD9; color: #B26B00; }
  .meta-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .meta-table td { padding: 5px 0; border: none; font-size: 13px; vertical-align: top; }
  .meta-table td.k { color: var(--grey); width: 130px; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; padding-right: 12px; }
  .meta-table td.v { font-family: 'Space Mono', monospace; }
  .elog-title { font-size: 11px; text-transform: uppercase; color: var(--grey); letter-spacing: .5px; margin: 16px 0 6px; }
  .elog-body { white-space: pre-wrap; font-family: 'Space Mono', monospace; font-size: 12.5px; line-height: 1.65; background: #FBF8F1; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; overflow-x: auto; }

  /* ── Triage + analytics (Stage 3) ───────────────────────────────────── */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .controls input, .controls select { font-family: 'Barlow', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); color: var(--ink); }
  .controls input { flex: 1; min-width: 180px; }
  .tier { margin-bottom: 4px; }
  .tier-head { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--grey); margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
  .tier-head .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .dot.red { background: var(--red); } .dot.amber { background: var(--yellow); } .dot.green { background: var(--green); }
  details.tier-ok summary { cursor: pointer; list-style: none; }
  details.tier-ok summary::-webkit-details-marker { display: none; }
  details.tier-ok summary:hover { color: var(--ink); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card.alert-red { border-left: 3px solid var(--red); }
  .card.alert-amber { border-left: 3px solid var(--yellow); }
  .zrow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .zpill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: #F2EEE7; color: var(--grey); white-space: nowrap; }
  .zpill.green { background: #E7F4EC; color: var(--green); }
  .zpill.amber { background: #FBEFD9; color: #B26B00; }
  .zpill.red   { background: #FBEAE4; color: var(--red); }
  .flags { display: flex; flex-direction: column; gap: 4px; margin-top: 11px; }
  .flag { font-size: 11.5px; color: var(--grey); display: flex; align-items: center; gap: 7px; }
  .flag .fdot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .spark { margin-top: 10px; min-height: 30px; }

  /* Detail-view charts */
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 6px 0 4px; }
  @media (max-width: 680px) { .charts { grid-template-columns: 1fr; } }
  .chart-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
  .chart-card h4 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: .5px; font-size: 14px; color: var(--grey); margin-bottom: 6px; }
  .chart-big { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1.1; }
  .chart-sub { font-size: 12px; color: var(--grey); margin-top: 3px; }
  .chart-svg { display: block; width: 100%; height: auto; margin-top: 12px; }
  .chart-legend { font-size: 11px; color: var(--grey); margin-top: 8px; line-height: 1.4; }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate" class="gate" style="display:none">
  <h1>Coach Dashboard</h1>
  <p>Private. Sign in with the coach Google account to view athlete progress.</p>
  <button id="loginBtn" class="btn primary">Sign in with Google</button>
  <div id="gateErr" class="err"></div>
</div>

<!-- DASHBOARD -->
<div id="app" class="wrap" style="display:none">
  <div class="topbar">
    <div>
      <h1>Athletes</h1>
      <div class="who" id="who"></div>
    </div>
    <button id="logoutBtn" class="btn">Sign out</button>
  </div>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script>
// --- config -----------------------------------------------------------------
const SB_URL = 'https://bvipfipbdcyqnbczjmaq.supabase.co';
const SB_KEY = 'sb_publishable_BuDVTTC1E0eg3wc7F1Pcig_1A_tqYCy';
const COACH_EMAIL = 'amirardekanian@gmail.com';   // UX-only; the DB (RLS) is the real gate
const QUIET_DAYS = 7;                              // mark athlete "quiet" after N idle days

const sb = supabase.createClient(SB_URL, SB_KEY);
const $ = (id) => document.getElementById(id);

// --- auth -------------------------------------------------------------------
$('loginBtn').onclick = () =>
  sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.href.split('#')[0] } });
$('logoutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };

let booted = false;
async function boot() {
  if (booted) return; booted = true;
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { booted = false; return showGate(); }
  const email = (session.user.email || '').toLowerCase();
  if (email !== COACH_EMAIL.toLowerCase()) {
    await sb.auth.signOut();
    booted = false;
    return showGate('That account isn’t the coach account. Try again.');
  }
  $('gate').style.display = 'none';
  $('app').style.display = 'block';
  $('who').textContent = 'Signed in as ' + session.user.email;
  loadOverview();
}
function showGate(err) { $('app').style.display = 'none'; $('gate').style.display = 'block'; $('gateErr').textContent = err || ''; }
sb.auth.onAuthStateChange(() => { booted = false; boot(); });
boot();

// --- helpers ----------------------------------------------------------------
function timeAgo(iso) {
  if (!iso) return '—';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d <= 0) return 'today'; if (d === 1) return 'yesterday'; return d + ' days ago';
}
function daysSince(iso) { return iso ? Math.floor((Date.now() - new Date(iso)) / 86400000) : 9999; }
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function jparse(v) { try { return JSON.parse(v); } catch { return null; } }

// --- Stage 2: per-athlete secure keys (Path B) ------------------------------
const SITE = 'https://www.amirardekani.com';
function genKey() {
  const raw = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : (Date.now().toString(36) + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2));
  return raw.replace(/-/g, '');
}
async function fetchKeys() {
  const { data } = await sb.from('athlete_keys').select('athlete_id, secret_key');
  const m = {};
  (data || []).forEach(r => { m[r.athlete_id] = r.secret_key; });
  return m;
}
function secureLink(athleteId, key) {
  return `${SITE}/program.html?client=${encodeURIComponent(athleteId)}&key=${encodeURIComponent(key)}`;
}
async function protectAthlete(athleteId) {
  const key = genKey();
  const { error } = await sb.from('athlete_keys')
    .upsert({ athlete_id: athleteId, secret_key: key }, { onConflict: 'athlete_id' });
  if (error) { alert('Could not save key: ' + error.message); return; }
  loadAthlete(athleteId);
}
function copyText(t, btn) {
  navigator.clipboard.writeText(t).then(() => {
    if (btn) { const o = btn.textContent; btn.textContent = 'Copied ✓'; setTimeout(() => btn.textContent = o, 1500); }
  }, () => alert('Copy failed — here is the link:\n\n' + t));
}
async function newAthleteLink() {
  const id = (prompt('New athlete ID (must match their data/<id>.json file, e.g. john_doe):') || '').trim();
  if (!id) return;
  const key = genKey();
  const { error } = await sb.from('athlete_keys')
    .upsert({ athlete_id: id, secret_key: key }, { onConflict: 'athlete_id' });
  if (error) { alert('Could not save key: ' + error.message); return; }
  const link = secureLink(id, key);
  copyText(link);
  alert('Secure link created & copied to clipboard:\n\n' + link + '\n\nMake sure data/' + id + '.json exists, then send this link to the athlete.');
}
window.protectAthlete = protectAthlete;
window.copyText = copyText;
window.newAthleteLink = newAthleteLink;

// Strip the "<athlete_id>_" prefix and bucket the blob into something the
// dashboard can render. The app stores progress as many flat keys; we decode
// them back into days + exercise logs here.
function decode(athleteId, blob) {
  const prefix = athleteId + '_';
  const days = {};        // dayNum -> { completed, completedOn, srpe, readiness, note }
  const ex = {};          // exerciseName -> { sets, rpe, note }
  const day = n => (days[n] = days[n] || {});
  const exer = k => (ex[k] = ex[k] || {});

  Object.keys(blob || {}).forEach(fullKey => {
    if (fullKey.indexOf(prefix) !== 0) return;
    const key = fullKey.slice(prefix.length);
    const val = blob[fullKey];
    let m;
    if ((m = key.match(/^completed_d(\d+)$/)))   { const d = day(m[1]); d.completed = true; d.completedOn = val; }
    else if ((m = key.match(/^srpe_(\d+)$/)))    { day(m[1]).srpe = val; }
    else if ((m = key.match(/^readiness_(\d+)$/))) { day(m[1]).readiness = jparse(val); }
    else if ((m = key.match(/^daynote_(\d+)$/))) { day(m[1]).note = val; }
    else if ((m = key.match(/^setlog_(.+)$/)))   { exer(m[1]).sets = jparse(val) || []; }
    else if ((m = key.match(/^note_(.+)$/)))     { exer(m[1]).note = val; }
    else if ((m = key.match(/^rpe_(.+)$/)))      { exer(m[1]).rpe = val; }
    // (timer_, sent_d, prog_state, dark_mode → ignored)
  });
  return { days, ex };
}
function unslug(s) { return s.replace(/_/g, ' '); }

// --- training-load + readiness analytics ------------------------------------
// All derived from session_history. Load uses Foster's session-RPE method
// (load = session RPE × duration in minutes). ACWR = acute (7-day) ÷ chronic
// (28-day weekly average). Readiness uses the composite each athlete self-reports.
// Colours are hex (not CSS vars) because var() isn't reliable inside SVG attrs.
const C = { blue:'#2F6DB0', green:'#3A8F5E', red:'#C0563B', yellow:'#E8B84B', amber:'#B26B00', grey:'#6B6B6B', ink:'#1A1A1A' };
function pDate(iso) { const p = String(iso).split('-'); return new Date(+p[0], (+p[1]) - 1, +p[2]); }
function round1(n) { return Math.round(n * 10) / 10; }

// { 'YYYY-MM-DD' -> total AU that day }
function dailyLoad(sessions) {
  const m = {};
  sessions.forEach(s => {
    if (s.session_rpe != null && s.duration_min != null && s.completed_on)
      m[s.completed_on] = (m[s.completed_on] || 0) + Number(s.session_rpe) * Number(s.duration_min);
  });
  return m;
}
// Rolling-average ACWR as of `ref` (default today). `enough` gates the display
// so a thin history never produces a misleading ratio.
function computeAcwr(daily, ref) {
  const keys = Object.keys(daily);
  if (!keys.length) return { ratio: null, acute: 0, chronicWeekly: 0, enough: false, spanDays: 0 };
  const r = ref || new Date();
  const refMid = new Date(r.getFullYear(), r.getMonth(), r.getDate());
  let acute = 0, chronic = 0, earliest = null;
  keys.forEach(iso => {
    const d = pDate(iso), diff = Math.floor((refMid - d) / 86400000);
    if (earliest === null || d < earliest) earliest = d;
    if (diff >= 0 && diff < 7)  acute   += daily[iso];
    if (diff >= 0 && diff < 28) chronic += daily[iso];
  });
  const chronicWeekly = chronic / 4;
  const spanDays = earliest !== null ? Math.floor((refMid - earliest) / 86400000) : 0;
  return { ratio: chronicWeekly > 0 ? acute / chronicWeekly : null,
           acute, chronicWeekly, enough: spanDays >= 14 && chronicWeekly > 0, spanDays };
}
function acwrZone(r) {
  if (r == null) return { label: '—', cls: '' };
  if (r > 1.5)  return { label: 'High load', cls: 'red' };
  if (r > 1.3)  return { label: 'Climbing',  cls: 'amber' };
  if (r >= 0.8) return { label: 'Optimal',   cls: 'green' };
  return { label: 'Low load', cls: 'amber' };
}
// Composite readiness over time (ascending) + baseline/latest.
function readinessSeries(sessions) {
  return sessions
    .filter(s => s.readiness && !s.readiness.skipped && s.readiness.composite != null)
    .map(s => ({ iso: s.completed_on, v: Number(s.readiness.composite) }))
    .filter(p => p.iso && !isNaN(p.v))
    .sort((a, b) => a.iso.localeCompare(b.iso));
}
function readinessStats(series) {
  if (!series.length) return null;
  const v = series.map(p => p.v), base = v.reduce((a, b) => a + b, 0) / v.length;
  const latest = v[v.length - 1];
  return { baseline: base, latest, delta: latest - base, n: v.length };
}
// Weekly buckets (Mon-start) of load for the last `weeks` weeks, oldest → newest.
function weeklyLoad(daily, weeks, ref) {
  const r = ref || new Date();
  const monday = new Date(r.getFullYear(), r.getMonth(), r.getDate());
  monday.setDate(monday.getDate() - ((monday.getDay() + 6) % 7));   // back to this week's Monday
  const buckets = [];
  for (let i = weeks - 1; i >= 0; i--) { const start = new Date(monday); start.setDate(start.getDate() - i * 7); buckets.push({ start, load: 0 }); }
  Object.keys(daily).forEach(iso => {
    const d = pDate(iso);
    for (let i = buckets.length - 1; i >= 0; i--) { if (d >= buckets[i].start) { buckets[i].load += daily[iso]; break; } }
  });
  return buckets;
}
// Bundle every metric for one athlete from their session rows.
function athleteMetrics(sessions, lastActive) {
  const daily = dailyLoad(sessions);
  const rser  = readinessSeries(sessions);
  const loadPts = sessions
    .filter(s => s.session_rpe != null && s.duration_min != null && s.completed_on)
    .slice().sort((a, b) => String(a.completed_on).localeCompare(String(b.completed_on)))
    .map(s => Number(s.session_rpe) * Number(s.duration_min));
  const byRecent = sessions.slice().sort((a, b) => String(b.completed_on).localeCompare(String(a.completed_on)));
  const lastPartial = byRecent.length ? (String(byRecent[0].status || '').toLowerCase().indexOf('partial') === 0) : false;
  return { daily, acwr: computeAcwr(daily), rser, readiness: readinessStats(rser),
           loadPts, lastPartial, daysIdle: daysSince(lastActive) };
}
// Triage signals → { tier:'red'|'amber'|'ok', flags:[{sev,msg}] }
function triage(m) {
  const flags = [], rank = { red: 2, amber: 1, ok: 0 }; let tier = 'ok';
  const add = (sev, msg) => { flags.push({ sev, msg }); if (rank[sev] > rank[tier]) tier = sev; };
  if (m.daysIdle > 14)            add('red', 'Silent — ' + m.daysIdle + ' days, no training');
  else if (m.daysIdle > QUIET_DAYS) add('amber', 'Quiet — ' + m.daysIdle + ' days idle');
  if (m.acwr.enough && m.acwr.ratio != null) {
    if (m.acwr.ratio > 1.5)      add('red',   'Load spike — ACWR ' + round1(m.acwr.ratio));
    else if (m.acwr.ratio > 1.3) add('amber', 'Load climbing — ACWR ' + round1(m.acwr.ratio));
    else if (m.acwr.ratio < 0.8) add('amber', 'Detraining — ACWR ' + round1(m.acwr.ratio));
  }
  if (m.readiness) {
    if (m.readiness.delta <= -1)        add('red',   'Readiness ↓ ' + round1(m.readiness.latest) + ' vs ' + round1(m.readiness.baseline) + ' usual');
    else if (m.readiness.delta <= -0.5) add('amber', 'Readiness dipping');
  }
  if (m.lastPartial) add('amber', 'Last session left partial');
  flags.sort((a, b) => rank[b.sev] - rank[a.sev]);
  return { tier, flags };
}

// --- tiny inline-SVG charts (no dependency) ---------------------------------
function sparkline(values, color, w, h) {
  w = w || 400; h = h || 40;   // wide aspect so the full-width SVG stays a compact strip
  const pts = values.filter(v => v != null && !isNaN(v));
  if (pts.length < 2) return '<span class="muted" style="font-size:11px">not enough data yet</span>';
  const min = Math.min(...pts), max = Math.max(...pts), rng = (max - min) || 1;
  const X = i => (i / (pts.length - 1)) * (w - 2) + 1;
  const Y = v => h - 2 - ((v - min) / rng) * (h - 4);
  const d = pts.map((v, i) => (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(v).toFixed(1)).join(' ');
  const lx = X(pts.length - 1), ly = Y(pts[pts.length - 1]);
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.4" fill="${color}"/></svg>`;
}
function barsSVG(buckets, color) {
  const w = 320, h = 96, base = h - 4, top = 8, n = buckets.length || 1;
  const max = Math.max(1, ...buckets.map(b => b.load)), slot = w / n;
  const bars = buckets.map((b, i) => {
    const bh = (b.load / max) * (base - top), x = i * slot + slot * 0.18, bw = slot * 0.64, y = base - bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, bh).toFixed(1)}" rx="2" fill="${color}" opacity="${b.load ? 0.85 : 0.18}"></rect>`;
  }).join('');
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}">${bars}</svg>`;
}
function lineSVG(series, opts) {
  opts = opts || {};
  const w = 320, h = 96, top = 10, bot = h - 14, left = 4, right = w - 4;
  const yMin = opts.yMin != null ? opts.yMin : 1, yMax = opts.yMax != null ? opts.yMax : 5;
  const X = i => series.length > 1 ? left + (i / (series.length - 1)) * (right - left) : (left + right) / 2;
  const Y = v => bot - ((v - yMin) / ((yMax - yMin) || 1)) * (bot - top);
  const d = series.map((p, i) => (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(p.v).toFixed(1)).join(' ');
  const dots = series.map((p, i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="2.2" fill="${opts.color}"/>`).join('');
  let baseLine = '';
  if (opts.baseline != null) { const by = Y(opts.baseline).toFixed(1); baseLine = `<line x1="${left}" y1="${by}" x2="${right}" y2="${by}" stroke="${C.grey}" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>`; }
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}">${baseLine}<path d="${d}" fill="none" stroke="${opts.color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`;
}
// The two-up charts shown at the top of an athlete's detail view.
function renderCharts(m) {
  const az = acwrZone(m.acwr.enough ? m.acwr.ratio : null);
  const azColor = az.cls === 'red' ? 'var(--red)' : az.cls === 'amber' ? '#B26B00' : az.cls === 'green' ? 'var(--green)' : 'var(--ink)';
  const hasLoad = Object.keys(m.daily).length > 0;
  const loadCard = `<div class="chart-card">
    <h4>Training load</h4>
    ${m.acwr.enough && m.acwr.ratio != null
      ? `<div class="chart-big" style="color:${azColor}">${round1(m.acwr.ratio)}<span style="font-size:13px;color:var(--grey);margin-left:6px">ACWR · ${az.label}</span></div>
         <div class="chart-sub">${Math.round(m.acwr.acute)} AU this week vs ${Math.round(m.acwr.chronicWeekly)} AU weekly average</div>`
      : `<div class="chart-big" style="font-size:18px;color:var(--grey)">Building baseline</div>
         <div class="chart-sub">Needs ~2 weeks of sessions (with duration logged) before the acute:chronic ratio means anything.</div>`}
    ${hasLoad
      ? barsSVG(weeklyLoad(m.daily, 8), C.blue) + `<div class="chart-legend">Weekly load (AU = session RPE × minutes), last 8 weeks</div>`
      : `<p class="muted" style="margin-top:10px">No load data yet — needs sessions with a logged duration.</p>`}
  </div>`;

  const r = m.readiness;
  const rColor = !r ? 'var(--grey)' : r.delta <= -1 ? 'var(--red)' : r.delta <= -0.5 ? '#B26B00' : 'var(--green)';
  const readyCard = `<div class="chart-card">
    <h4>Readiness</h4>
    ${r
      ? `<div class="chart-big" style="color:${rColor}">${round1(r.latest)}<span style="font-size:13px;color:var(--grey);margin-left:4px">/5 · usual ${round1(r.baseline)}</span></div>
         <div class="chart-sub">${r.delta >= 0 ? '+' : ''}${round1(r.delta)} vs their ${r.n}-session average</div>
         ${lineSVG(m.rser, { color: C.green, baseline: r.baseline, yMin: 1, yMax: 5 })}
         <div class="chart-legend">Composite readiness per session (1–5, higher = fresher) · dashed line = baseline</div>`
      : `<p class="muted" style="margin-top:10px">No readiness check-ins yet.</p>`}
  </div>`;

  return `<div class="charts">${loadCard}${readyCard}</div>`;
}

// --- overview (triage) ------------------------------------------------------
// One card per athlete, grouped by athlete_id across BOTH tables, then grouped
// into attention tiers. Full session rows are pulled so the front page can show
// load/readiness trends and flag who needs the coach right now.
let _overview = [];
async function loadOverview() {
  $('content').innerHTML = '<div class="loading">Loading…</div>';
  const [progRes, histRes, keys] = await Promise.all([
    sb.from('athlete_progress').select('*'),
    sb.from('session_history').select('athlete_id, athlete_name, day, completed_on, status, session_rpe, duration_min, readiness, updated_at'),
    fetchKeys()
  ]);
  if (progRes.error && histRes.error) {
    $('content').innerHTML = `<p class="muted">Could not load data: ${esc((progRes.error || histRes.error).message)}</p>`; return;
  }
  const progRows = progRes.data || [];
  const histRows = histRes.data || [];
  if (!progRows.length && !histRows.length) {
    $('content').innerHTML = '<p class="muted">No athlete activity yet. Once an athlete trains, they’ll appear here.</p>'; return;
  }

  // Group everything by athlete.
  const map = {};
  const get = (id) => (map[id] = map[id] || { id, name: id, finished: 0, completedDays: 0, lastActive: null, sessions: [] });
  const touch = (a, name, when) => {
    if (name) a.name = name;
    if (when && (!a.lastActive || when > a.lastActive)) a.lastActive = when;
  };
  progRows.forEach(row => {
    const a = get(row.athlete_id);
    touch(a, row.athlete_name, row.updated_at);
    const { days } = decode(row.athlete_id, row.data);
    a.completedDays = Object.keys(days).filter(n => days[n].completed).length;
  });
  histRows.forEach(row => {
    const a = get(row.athlete_id);
    touch(a, row.athlete_name, row.updated_at);
    a.finished++;
    a.sessions.push(row);
  });

  _overview = Object.values(map).map(a => {
    const metrics = athleteMetrics(a.sessions, a.lastActive);
    const t = triage(metrics);
    return Object.assign(a, { metrics, tier: t.tier, flags: t.flags, isProtected: !!keys[a.id] });
  });

  $('content').innerHTML = `
    <div class="controls">
      <input id="searchBox" placeholder="Search athletes…" oninput="renderCards()">
      <select id="sortSel" onchange="renderCards()">
        <option value="attention">Sort: needs attention</option>
        <option value="recent">Sort: recently active</option>
        <option value="name">Sort: name</option>
      </select>
      <button class="btn primary sm" onclick="newAthleteLink()">+ New secure link</button>
    </div>
    <div id="cards"></div>`;
  renderCards();
}

function athleteCard(a) {
  const m = a.metrics;
  const az = acwrZone(m.acwr.enough ? m.acwr.ratio : null);
  const acwrPill = (m.acwr.enough && m.acwr.ratio != null)
    ? `<span class="zpill ${az.cls}">ACWR ${round1(m.acwr.ratio)} · ${az.label}</span>`
    : `<span class="zpill">ACWR · building</span>`;
  const rPill = m.readiness
    ? `<span class="zpill ${m.readiness.delta <= -1 ? 'red' : (m.readiness.delta <= -0.5 ? 'amber' : 'green')}">Readiness ${round1(m.readiness.latest)}/5</span>`
    : '';
  const alertCls = a.tier === 'red' ? 'alert-red' : (a.tier === 'amber' ? 'alert-amber' : '');
  const flagsHtml = a.flags.length
    ? `<div class="flags">${a.flags.slice(0, 3).map(f => `<div class="flag"><span class="fdot" style="background:${f.sev === 'red' ? C.red : C.yellow}"></span>${esc(f.msg)}</div>`).join('')}</div>`
    : '';
  return `<div class="card ${alertCls}" onclick="loadAthlete('${esc(a.id)}')">
    <div class="card-top">
      <div class="name">${esc(a.name)}</div>
      <span class="zpill ${a.isProtected ? 'green' : 'amber'}" title="${a.isProtected ? 'Secure link' : 'Legacy link'}">${a.isProtected ? '🔒' : '⚠'}</span>
    </div>
    <div class="meta">last active ${timeAgo(a.lastActive)} · ${a.finished} session${a.finished === 1 ? '' : 's'}</div>
    <div class="spark">${sparkline(m.loadPts, C.blue)}</div>
    <div class="zrow">${acwrPill}${rPill}</div>
    ${flagsHtml}
  </div>`;
}

// Filter + sort + (when sorting by attention) group into tiers. Re-renders only
// the cards container so the search box keeps focus as you type.
function renderCards() {
  const q = (($('searchBox') || {}).value || '').toLowerCase();
  const sort = (($('sortSel') || {}).value) || 'attention';
  const rank = { red: 2, amber: 1, ok: 0 };
  let list = _overview.filter(a => a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q));
  if (sort === 'name')        list.sort((a, b) => a.name.localeCompare(b.name));
  else if (sort === 'recent') list.sort((a, b) => (b.lastActive || '').localeCompare(a.lastActive || ''));
  else                        list.sort((a, b) => (rank[b.tier] - rank[a.tier]) || (b.lastActive || '').localeCompare(a.lastActive || ''));

  if (!list.length) { $('cards').innerHTML = `<p class="muted">No athletes match “${esc(q)}”.</p>`; return; }

  if (sort === 'attention') {
    const groups = [['red', 'Needs attention', 'red'], ['amber', 'Watch', 'amber'], ['ok', 'On track', 'green']];
    $('cards').innerHTML = groups.map(([key, label, dot]) => {
      const g = list.filter(a => a.tier === key);
      if (!g.length) return '';
      const cards = `<div class="grid">${g.map(athleteCard).join('')}</div>`;
      if (key === 'ok')
        return `<details class="tier tier-ok"><summary class="tier-head"><span class="dot ${dot}"></span>${label} (${g.length}) · tap to show</summary>${cards}</details>`;
      return `<div class="tier"><div class="tier-head"><span class="dot ${dot}"></span>${label} (${g.length})</div>${cards}</div>`;
    }).join('');
  } else {
    $('cards').innerHTML = `<div class="grid">${list.map(athleteCard).join('')}</div>`;
  }
}
window.renderCards = renderCards;

// --- finished-session card (email-style) ------------------------------------
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function prettyDate(iso) {           // 'YYYY-MM-DD' -> 'Mon 25 May 2026'
  if (!iso) return '';
  const p = String(iso).split('-');
  if (p.length !== 3) return iso;
  const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] || '';
  return `${dow} ${Number(p[2])} ${MONTHS[Number(p[1]) - 1]} ${p[0]}`;
}
// The stored `summary` is the full email body (meta + exercise log). We show
// meta in a clean table, so pull out just the "Exercise log:" section to avoid
// duplicating it. If the marker isn't found, fall back to the whole summary.
function exerciseLogPart(summary) {
  if (!summary) return '';
  const i = summary.indexOf('Exercise log:');
  const body = i >= 0 ? summary.slice(i + 'Exercise log:'.length) : summary;
  return body.replace(/^\s+/, '');
}
function renderSessionCard(athleteId, s) {
  const partial = (s.status || '').toLowerCase().indexOf('partial') === 0;
  const rd = s.readiness;

  // Session load (AU) = session RPE × duration (Foster's method) — same figure
  // the email reports. Only meaningful when a duration was recorded.
  const auLoad = (s.session_rpe != null && s.duration_min != null)
    ? s.session_rpe * s.duration_min : null;

  let readinessRow = '';
  if (rd) {
    if (rd.skipped) readinessRow = `<tr><td class="k">Readiness</td><td class="v">skipped</td></tr>`;
    else {
      const parts = ['sleep','energy','soreness','stress','overall']
        .filter(k => rd[k] != null).map(k => `${k} ${rd[k]}`).join(' · ');
      readinessRow = `<tr><td class="k">Readiness</td><td class="v">${rd.composite != null ? esc(rd.composite) + '/5' : ''}${parts ? ' · ' + esc(parts) : ''}</td></tr>`;
    }
  }

  const meta = `<table class="meta-table">
    <tr><td class="k">Status</td><td class="v">${esc(s.status || 'sent')}</td></tr>
    ${s.session_rpe != null ? `<tr><td class="k">Session RPE</td><td class="v">${esc(s.session_rpe)}/10</td></tr>` : ''}
    ${s.duration_min != null ? `<tr><td class="k">Duration</td><td class="v">${esc(s.duration_min)} min</td></tr>` : ''}
    ${auLoad != null ? `<tr><td class="k">Session load</td><td class="v">${esc(auLoad)} AU <span style="color:var(--grey)">(RPE ${esc(s.session_rpe)} × ${esc(s.duration_min)} min)</span></td></tr>` : ''}
    ${readinessRow}
  </table>`;

  const elog = exerciseLogPart(s.summary);

  return `<div class="day">
    <div class="day-head">
      <div>
        <h3>Day ${esc(s.day)}${s.focus ? ' — ' + esc(s.focus) : ''}
          <span class="tag ${partial ? 'partial' : 'done'}">${partial ? 'Partial' : 'Complete'}</span></h3>
        <div class="day-date">${esc(prettyDate(s.completed_on))}</div>
      </div>
      <button class="btn sm danger" onclick="deleteSession('${esc(athleteId)}', ${Number(s.day)}, '${esc(s.completed_on)}')">Delete</button>
    </div>
    ${meta}
    ${s.day_note ? `<div class="note"><b>Athlete note:</b> ${esc(s.day_note)}</div>` : ''}
    ${elog ? `<div class="elog-title">Exercise log</div><div class="elog-body">${esc(elog)}</div>` : ''}
  </div>`;
}

// --- athlete detail ---------------------------------------------------------
async function loadAthlete(athleteId) {
  $('content').innerHTML = '<div class="loading">Loading…</div>';
  const [progRes, histRes, keyRes] = await Promise.all([
    sb.from('athlete_progress').select('*').eq('athlete_id', athleteId).maybeSingle(),
    sb.from('session_history').select('*').eq('athlete_id', athleteId)
      .order('completed_on', { ascending: false }).order('day', { ascending: true }),
    sb.from('athlete_keys').select('secret_key').eq('athlete_id', athleteId).maybeSingle()
  ]);
  if (progRes.error && histRes.error) {
    $('content').innerHTML = `<p class="muted">Error: ${esc((progRes.error || histRes.error).message)}</p>`; return;
  }
  const prog       = progRes.data;            // may be null if they only have history
  const history    = histRes.data || [];
  const key        = keyRes.data && keyRes.data.secret_key;
  const name       = (prog && prog.athlete_name) || (history[0] && history[0].athlete_name) || athleteId;
  const lastActive = (prog && prog.updated_at) || (history[0] && history[0].updated_at) || null;
  const metrics    = athleteMetrics(history, lastActive);   // load + readiness trends

  // Secure-link panel (Stage 2 / Path B)
  const link = key ? secureLink(athleteId, key) : '';
  const linkHtml = key
    ? `<div class="note" style="border-left-color:var(--green)">
         <div style="margin-bottom:8px"><b>🔒 Secure link</b> — only this link can sync ${esc(name)}'s data.</div>
         <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
           <input readonly value="${esc(link)}" onclick="this.select()" style="flex:1;min-width:240px;font-family:'Space Mono',monospace;font-size:12px;padding:8px;border:1px solid var(--line);border-radius:8px">
           <button class="btn sm" onclick="copyText('${esc(link)}', this)">Copy link</button>
           <button class="btn sm danger" onclick="if(confirm('Rotate the key? The OLD link will stop syncing immediately and you must send ${esc(name)} the new one.')) protectAthlete('${esc(athleteId)}')">Rotate key</button>
         </div>
       </div>`
    : `<div class="note">
         <div style="margin-bottom:8px"><b>⚠ Legacy link</b> — anyone with ${esc(name)}'s plain link can write to their record. Generate a secure link to lock it down.</div>
         <button class="btn sm primary" onclick="protectAthlete('${esc(athleteId)}')">Generate secure link</button>
       </div>`;

  // ── Permanent finished sessions (captured on Finish; never degrade) ──
  // Rendered like the original coach email: each completion is its own dated
  // entry (full OR partial), with the full meta + exercise log laid out openly.
  const histHtml = history.length ? history.map(s => renderSessionCard(athleteId, s)).join('')
    : '<p class="muted">No finished sessions yet — these appear when an athlete taps Finish / send to coach.</p>';

  // ── Live activity (rolling snapshot; may be partial / cleared on rollover) ──
  // The snapshot stores exercise logs keyed by exercise NAME only (no day), so
  // to group each exercise under its day we load the athlete's program file
  // (same data/<id>.json the app uses) and map name → day.
  const { days, ex } = prog ? decode(athleteId, prog.data) : { days: {}, ex: {} };
  let program = null;
  try { const pr = await fetch(`data/${athleteId}.json`); if (pr.ok) program = await pr.json(); } catch (e) {}
  const programDays = (program && program.workouts && program.workouts.days) || [];

  // exercise slug (name with spaces→_) → that exercise's logged data
  const exForName = (name) => ex[String(name).replace(/\s+/g, '_')];
  const setStr = (e) => (e.sets || []).map(s => {
    const bits = [s.w, s.r ? '@' + s.r : ''].filter(Boolean).join(' ');
    return (bits || '·') + (s.d ? ' ✓' : '');
  }).join(' · ');
  const hasData = (e) => e && ((e.sets && e.sets.some(s => s.w || s.r || s.d)) || e.note || e.rpe);

  // Build one card per program day, with that day's exercises grouped beneath it.
  let daysHtml = '';
  if (programDays.length) {
    daysHtml = programDays.map(pd => {
      const d = days[pd.id] || {};
      const rd = d.readiness;
      let readinessHtml = '';
      if (rd) {
        if (rd.skipped) readinessHtml = '<div class="readiness"><span class="r">Readiness: <b>skipped</b></span></div>';
        else readinessHtml = `<div class="readiness">
          ${rd.composite != null ? `<span class="r">Readiness <b>${esc(rd.composite)}/5</b></span>` : ''}
          ${['sleep','energy','soreness','stress','overall'].filter(k=>rd[k]!=null).map(k=>`<span class="r">${k} <b>${esc(rd[k])}</b></span>`).join('')}
        </div>`;
      }
      // exercises for this day, in program order, that actually have logs
      const rows = [];
      (pd.blocks || []).forEach(block => (block.exercises || []).forEach(exr => {
        const e = exForName(exr.name);
        if (hasData(e)) rows.push({ name: exr.name, sets: setStr(e), rpe: e.rpe, note: e.note });
      }));
      const exTable = rows.length ? `<table>
        <tr><th>Exercise</th><th>Sets logged (wt @ RPE)</th><th>Note</th></tr>
        ${rows.map(r => `<tr><td>${esc(r.name)}</td><td class="num">${esc(r.sets) || (r.rpe ? 'RPE ' + esc(r.rpe) : '—')}</td><td>${esc(r.note || '')}</td></tr>`).join('')}
      </table>` : '<p class="muted" style="margin-top:8px">No exercise logs recorded for this day yet.</p>';

      const touched = d.completed || d.srpe || d.note || rd || rows.length;
      return `<div class="day">
        <div class="day-head">
          <h3>Day ${esc(pd.id)}${pd.focusTag ? ' — ' + esc(pd.focusTag) : ''}
            ${d.completed ? '<span class="tag done">✓ Completed</span>' : (touched ? '<span class="tag">In progress</span>' : '<span class="tag" style="opacity:.6">Not started</span>')}
            <span class="when">${d.completedOn ? '· ' + esc(d.completedOn) : ''}${d.srpe ? ' · session RPE ' + esc(d.srpe) + '/10' : ''}</span></h3>
        </div>
        ${readinessHtml}
        ${d.note ? `<div class="note"><b>Athlete note:</b> ${esc(d.note)}</div>` : ''}
        ${exTable}
      </div>`;
    }).join('');
  } else {
    // Fallback: no program file — flat list (old behaviour) so nothing is lost.
    const exNames = Object.keys(ex).filter(k => hasData(ex[k]));
    daysHtml = exNames.length ? `<div class="day"><table>
      <tr><th>Exercise</th><th>Sets logged (wt @ RPE)</th><th>Note</th></tr>
      ${exNames.map(k => `<tr><td>${esc(unslug(k))}</td><td class="num">${esc(setStr(ex[k])) || (ex[k].rpe ? 'RPE ' + esc(ex[k].rpe) : '—')}</td><td>${esc(ex[k].note || '')}</td></tr>`).join('')}
    </table></div>` : '<p class="muted">No live day data.</p>';
  }

  $('content').innerHTML = `<span class="back" onclick="loadOverview()">← All athletes</span>
    <div class="day-head" style="align-items:center;margin-bottom:8px">
      <div>
        <h2 style="font-size:26px;margin-bottom:4px">${esc(name)}</h2>
        <div class="muted">last active ${timeAgo(lastActive)} · ${history.length} finished session${history.length === 1 ? '' : 's'}</div>
      </div>
      <button class="btn sm danger" onclick="deleteAthlete('${esc(athleteId)}', '${esc(name)}')">Delete all data</button>
    </div>
    ${linkHtml}
    ${renderCharts(metrics)}
    <div class="sec-title">Finished sessions — permanent record</div>${histHtml}
    <div class="sec-title">Live activity — current snapshot (each day with its own logs)</div>${daysHtml}`;
}

// --- delete (coach only; enforced by RLS) -----------------------------------
async function deleteSession(athleteId, day, completedOn) {
  if (!confirm(`Delete the Day ${day} log from ${completedOn}?\n\nThis permanently removes that finished session. It cannot be undone.`)) return;
  const { error } = await sb.from('session_history').delete()
    .eq('athlete_id', athleteId).eq('day', day).eq('completed_on', completedOn);
  if (error) { alert('Could not delete: ' + error.message); return; }
  loadAthlete(athleteId);
}
async function deleteAthlete(athleteId, name) {
  if (!confirm(`Delete ALL data for ${name}?\n\nThis removes every finished session AND the live snapshot. It cannot be undone.`)) return;
  const r1 = await sb.from('session_history').delete().eq('athlete_id', athleteId);
  const r2 = await sb.from('athlete_progress').delete().eq('athlete_id', athleteId);
  if (r1.error || r2.error) { alert('Could not delete: ' + ((r1.error || r2.error).message)); return; }
  loadOverview();
}
window.deleteSession = deleteSession;
window.deleteAthlete = deleteAthlete;
window.loadAthlete = loadAthlete;
window.loadOverview = loadOverview;
</script>
