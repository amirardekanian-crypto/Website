<!DOCTYPE html>
<!--
  COACH DASHBOARD (Stage 1)
  Private view of athlete progress, synced from program.html.
  Access: Google sign-in, locked to the coach email (client check here +
  Row Level Security in the database is the real gate).
  Data source: Supabase table public.athlete_progress — each row holds one
  athlete's whole localStorage as a JSON blob in `data`, decoded below.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#FAF7F2">
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    /* Roland-Garros palette, shared with program.html: green primary, clay,
       ochre. Token names kept (--yellow/--blue) so existing refs need no rename. */
    --bg: #FAF7F2; --card: #FFFFFF; --card-soft: #EDE8E0; --ink: #1A1A1A; --grey: #5C5C5C;
    --line: #D8D1C5; --on-accent: #FFFFFF;
    --accent: #0E4A36; --yellow: #0E4A36;                 /* brand green (primary) */
    --green: #0E4A36;  --green-soft: #E6F0EA;             /* good / optimal */
    --red:   #C7552F;  --red-soft:   #F6E7E0;             /* clay — danger / high */
    --amber: #A8741C;  --amber-soft: #F2E9D8;             /* ochre — watch */
    --blue:  #0E4A36;                                     /* data viz → brand green */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; }
  h1, h2, h3 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: .5px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 26px 24px 80px; }

  /* Sticky brand nav, mirrored from program.html's .home-nav */
  .cnav { position: sticky; top: 0; z-index: 50; background: var(--accent); padding: 14px 24px;
          display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .cnav::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--red); }
  .cnav-brand { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 2px;
                color: var(--on-accent); text-decoration: none; text-transform: uppercase; }
  .cnav-brand span { opacity: .65; font-weight: 400; }
  .cnav-right { display: flex; align-items: center; gap: 14px; }
  .cnav-who { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.85); }
  .page-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 36px;
                text-transform: uppercase; letter-spacing: -0.5px; margin-bottom: 20px; }

  .btn { font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 600; border: 1px solid var(--line);
         background: var(--card); color: var(--ink); padding: 9px 16px; border-radius: 10px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .btn.primary:hover { opacity: .9; }
  .btn.ghost { background: transparent; border-color: rgba(255,255,255,0.45); color: var(--on-accent); }
  .btn.ghost:hover { border-color: var(--on-accent); background: rgba(255,255,255,0.12); }
  .btn.sm { padding: 4px 11px; font-size: 12px; border-radius: 8px; }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { border-color: var(--red); background: var(--red-soft); }
  .bar { height: 8px; background: var(--card-soft); border-radius: 6px; margin-top: 12px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; }
  .day-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .day-head h3 { flex: 1; min-width: 0; }

  .gate { max-width: 420px; margin: 12vh auto; text-align: center; background: var(--card);
          border: 1px solid var(--line); border-radius: 16px; padding: 40px 32px; }
  .gate h1 { font-size: 32px; margin-bottom: 8px; }
  .gate p { color: var(--grey); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  .gate .err { color: var(--red); font-size: 13px; margin-top: 16px; min-height: 18px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; cursor: pointer; transition: border-color .15s, transform .15s, box-shadow .15s; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(14,74,54,0.08); }
  .card .name { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 23px; text-transform: uppercase; letter-spacing: -0.3px; }
  .card .meta { font-size: 12px; color: var(--grey); margin-top: 2px; }
  .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin-top: 12px; }
  .pill.active { background: var(--green-soft); color: var(--green); }
  .pill.quiet  { background: var(--red-soft); color: var(--red); }
  .stats { display: flex; gap: 18px; margin-top: 14px; }
  .stat .n { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
  .stat .l { font-size: 10px; text-transform: uppercase; color: var(--grey); letter-spacing: .5px; }

  .back { font-size: 13px; color: var(--accent); font-weight: 600; cursor: pointer; margin-bottom: 16px; display: inline-block; }
  .sec-title { font-size: 16px; color: var(--grey); margin: 26px 0 12px; }
  .day { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; }
  .day h3 { font-size: 18px; }
  .day .when { font-size: 12px; color: var(--grey); font-weight: 400; text-transform: none; font-family: 'Barlow', sans-serif; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; color: var(--grey); letter-spacing: .5px; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  td { padding: 7px 8px; border-bottom: 1px solid #F2EEE7; vertical-align: top; }
  td.num { font-family: 'Space Mono', monospace; white-space: nowrap; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #F2EEE7; }
  .tag.done { background: var(--green-soft); color: var(--green); }
  .note { background: #FBF8F1; border-left: 3px solid var(--amber); padding: 9px 12px; border-radius: 6px; margin-top: 10px; font-size: 13px; }
  .readiness { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }
  .readiness .r { font-size: 12px; color: var(--grey); } .readiness .r b { font-family: 'Space Mono', monospace; color: var(--ink); }
  .muted { color: var(--grey); font-size: 13px; }
  .loading { text-align: center; color: var(--grey); padding: 60px 0; }

  /* Email-style finished-session card */
  .day-date { font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 13px; color: var(--ink); text-transform: none; margin-top: 3px; }
  .tag.partial { background: var(--amber-soft); color: var(--amber); }
  .meta-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .meta-table td { padding: 5px 0; border: none; font-size: 13px; vertical-align: top; }
  .meta-table td.k { color: var(--grey); width: 130px; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; padding-right: 12px; }
  .meta-table td.v { font-family: 'Space Mono', monospace; }
  .elog-title { font-size: 11px; text-transform: uppercase; color: var(--grey); letter-spacing: .5px; margin: 16px 0 6px; }
  .elog-body { white-space: pre-wrap; font-family: 'Space Mono', monospace; font-size: 12.5px; line-height: 1.65; background: #FBF8F1; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; overflow-x: auto; }

  /* ── Triage + analytics (Stage 3) ───────────────────────────────────── */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .controls input, .controls select { font-family: 'Barlow', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); color: var(--ink); }
  .controls input { flex: 1; min-width: 180px; }
  .tier { margin-bottom: 4px; }
  .tier-head { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--grey); margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
  .tier-head .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .dot.red { background: var(--red); } .dot.amber { background: var(--amber); } .dot.green { background: var(--green); }
  details.tier-ok summary { cursor: pointer; list-style: none; }
  details.tier-ok summary::-webkit-details-marker { display: none; }
  details.tier-ok summary:hover { color: var(--ink); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card.alert-red { border-left: 3px solid var(--red); }
  .card.alert-amber { border-left: 3px solid var(--amber); }
  .zrow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .zpill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: var(--card-soft); color: var(--grey); white-space: nowrap; }
  .zpill.green { background: var(--green-soft); color: var(--green); }
  .zpill.amber { background: var(--amber-soft); color: var(--amber); }
  .zpill.red   { background: var(--red-soft); color: var(--red); }
  .flags { display: flex; flex-direction: column; gap: 4px; margin-top: 11px; }
  .flag { font-size: 11.5px; color: var(--grey); display: flex; align-items: center; gap: 7px; }
  .flag .fdot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .spark { margin-top: 10px; min-height: 30px; }

  /* Detail-view charts */
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; margin: 6px 0 4px; }
  .chart-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px; }
  .chart-card h4 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: .5px; font-size: 14px; color: var(--grey); margin-bottom: 6px; }
  .chart-big { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1.1; }
  .chart-sub { font-size: 12px; color: var(--grey); margin-top: 3px; }
  .chart-svg { display: block; width: 100%; height: auto; margin-top: 12px; }
  .chart-legend { font-size: 11px; color: var(--grey); margin-top: 8px; line-height: 1.4; }

  /* Prescribed-program view */
  .prog-cycle { margin-bottom: 14px; }
  .prog-cycle-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 17px; letter-spacing: .3px; }
  .prog-focus { margin: 6px 0 0 18px; font-size: 13px; color: var(--grey); line-height: 1.5; }
  .pblock { margin-top: 12px; }
  .pblock-title { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--grey); border-bottom: 1px solid var(--line); padding-bottom: 5px; margin-bottom: 6px; }
  .pex { padding: 8px 0; border-bottom: 1px solid #F2EEE7; }
  .pex:last-child { border-bottom: none; }
  .pex-top { display: flex; align-items: center; gap: 8px; }
  .pex-name { font-weight: 600; font-size: 14px; }
  .pex-vid { text-decoration: none; color: var(--accent); font-size: 13px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .chip { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; background: var(--card-soft); color: var(--grey); }
  .chip-y { background: var(--green-soft); color: var(--green); }
  .chip-d { background: #2A2A2A; color: #fff; }
  .pex-items { font-size: 12px; color: var(--grey); margin-top: 5px; font-family: 'Space Mono', monospace; line-height: 1.6; }
  .logline { font-size: 12px; color: var(--accent); margin-top: 6px; font-family: 'Space Mono', monospace; }
  .prog-section summary { cursor: pointer; list-style: none; }
  .prog-section summary::-webkit-details-marker { display: none; }

  /* Collapsible day (detail view) — each program day is its own toggle, closed
     by default, so the workout is a tidy list of days instead of one long scroll. */
  details.day-c { background: var(--card); border: 1px solid var(--line); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
  details.day-c > summary { list-style: none; cursor: pointer; padding: 15px 18px; display: flex; align-items: center; gap: 12px; }
  details.day-c > summary::-webkit-details-marker { display: none; }
  details.day-c > summary:hover { background: rgba(0,0,0,0.02); }
  details.day-c[open] > summary { border-bottom: 1px solid var(--line); }
  .day-c-main { flex: 1; min-width: 0; }
  .day-c-main h3 { font-size: 18px; }
  .day-c-chev { margin-left: auto; color: var(--grey); transition: transform .2s; flex: none; font-size: 12px; }
  details.day-c[open] .day-c-chev { transform: rotate(180deg); }
  .day-c-body { padding: 14px 18px 18px; }

  /* Add-past-session (email import) form */
  .add-session { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .add-session textarea { width: 100%; min-height: 120px; resize: vertical; border: 1px solid var(--line); border-radius: 10px;
                          padding: 10px 12px; font-family: 'Space Mono', monospace; font-size: 12.5px; line-height: 1.5; background: var(--bg); color: var(--ink); }
  .add-session-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
  .add-session-row label { font-size: 13px; color: var(--grey); display: flex; align-items: center; gap: 8px; }
  .add-session-row input[type=date] { font-family: inherit; font-size: 14px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 9px; background: var(--bg); color: var(--ink); }
  .add-session-preview { margin-top: 12px; }
  .add-session-preview:empty { display: none; }

  /* ── Messaging / reply panel ──────────────────────────────────────── */
  .msg-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 18px; }
  .cthread { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .cmsg { display: flex; flex-direction: column; max-width: 80%; }
  .cmsg.coach { align-self: flex-end; align-items: flex-end; }
  .cmsg.ath { align-self: flex-start; align-items: flex-start; }
  .cmsg-bubble { font-size: 14px; line-height: 1.45; padding: 9px 12px; border-radius: 13px; }
  .cmsg.coach .cmsg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
  .cmsg.ath .cmsg-bubble { background: var(--card-soft); color: var(--ink); border-bottom-left-radius: 3px; }
  .cmsg-meta { font-size: 10px; color: var(--grey); margin-top: 3px; }
  .cmsg-tag { background: var(--red-soft); color: var(--red); padding: 1px 6px; border-radius: 8px; font-weight: 600; }
  .creply { display: flex; gap: 8px; }
  .creply textarea, .session-reply textarea { flex: 1; resize: vertical; min-height: 38px; border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; font-family: inherit; font-size: 14px; background: var(--bg); color: var(--ink); }
  .note-actions { display: flex; gap: 8px; margin-top: 8px; }
  .session-reply { gap: 8px; margin-top: 8px; }
  .zpill.reply { background: var(--red-soft); color: var(--red); font-weight: 600; }

  /* ── Tab navigation (Athletes | Chats) ────────────────────────────── */
  .tabs { display: flex; gap: 22px; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
  .tab { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase;
         letter-spacing: .5px; font-size: 22px; background: none; border: none; cursor: pointer;
         color: var(--grey); padding: 4px 2px 12px; margin-bottom: -1px; border-bottom: 2px solid transparent;
         display: inline-flex; align-items: center; gap: 9px; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab-badge { background: var(--red); color: #fff; font-family: 'Space Mono', monospace; font-size: 11px;
               font-weight: 700; line-height: 1; padding: 3px 7px; border-radius: 20px; }

  /* ── Chats inbox (conversation list) ──────────────────────────────── */
  .conv { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--line);
          border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s, transform .1s; }
  .conv:hover { border-color: var(--accent); transform: translateY(-1px); }
  .conv.unread { border-left: 3px solid var(--red); }
  .conv-avatar { width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; color: #fff;
                 background: linear-gradient(135deg, #0E4A36 0%, #14684c 100%);
                 display: flex; align-items: center; justify-content: center;
                 font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 17px; }
  .conv-body { flex: 1; min-width: 0; }
  .conv-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: .3px; }
  .conv-preview { font-size: 13px; color: var(--grey); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-preview b { color: var(--ink); font-weight: 600; }
  .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .conv-time { font-size: 11px; color: var(--grey); font-family: 'Space Mono', monospace; white-space: nowrap; }
  .conv-unread { background: var(--red); color: #fff; font-family: 'Space Mono', monospace; font-size: 11px;
                 font-weight: 700; min-width: 20px; text-align: center; padding: 2px 7px; border-radius: 20px; }
  /* Chat thread view */
  .chat-head { display: flex; align-items: center; gap: 14px; margin: 6px 0 18px; }
  .chat-head .conv-avatar { width: 52px; height: 52px; font-size: 19px; }
  .chat-thread-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; }
  .chat-empty { text-align: center; color: var(--grey); padding: 50px 0; }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate" class="gate" style="display:none">
  <h1>Coach Dashboard</h1>
  <p>Private. Sign in with the coach Google account to view athlete progress.</p>
  <button id="loginBtn" class="btn primary">Sign in with Google</button>
  <div id="gateErr" class="err"></div>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none">
  <header class="cnav">
    <a class="cnav-brand" href="/">AMIR ARDEKANI <span>· Coach</span></a>
    <div class="cnav-right">
      <span class="cnav-who" id="who"></span>
      <button id="logoutBtn" class="btn ghost sm">Sign out</button>
    </div>
  </header>
  <div class="wrap">
    <div id="tabbar"></div>
    <div id="content"><div class="loading">Loading…</div></div>
  </div>
</div>

<script>
// --- config -----------------------------------------------------------------
const SB_URL = 'https://bvipfipbdcyqnbczjmaq.supabase.co';
const SB_KEY = 'sb_publishable_BuDVTTC1E0eg3wc7F1Pcig_1A_tqYCy';
const COACH_EMAIL = 'amirardekanian@gmail.com';   // UX-only; the DB (RLS) is the real gate
const QUIET_DAYS = 7;                              // mark athlete "quiet" after N idle days

const sb = supabase.createClient(SB_URL, SB_KEY);
const $ = (id) => document.getElementById(id);

// --- auth -------------------------------------------------------------------
$('loginBtn').onclick = () =>
  sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.href.split('#')[0] } });
$('logoutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };

let booted = false;
async function boot() {
  if (booted) return; booted = true;
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { booted = false; return showGate(); }
  const email = (session.user.email || '').toLowerCase();
  if (email !== COACH_EMAIL.toLowerCase()) {
    await sb.auth.signOut();
    booted = false;
    return showGate('That account isn’t the coach account. Try again.');
  }
  $('gate').style.display = 'none';
  $('app').style.display = 'block';
  $('who').textContent = 'Signed in as ' + session.user.email;
  loadOverview();
}
function showGate(err) { $('app').style.display = 'none'; $('gate').style.display = 'block'; $('gateErr').textContent = err || ''; }
sb.auth.onAuthStateChange(() => { booted = false; boot(); });
boot();

// --- helpers ----------------------------------------------------------------
function timeAgo(iso) {
  if (!iso) return '—';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d <= 0) return 'today'; if (d === 1) return 'yesterday'; return d + ' days ago';
}
function daysSince(iso) { return iso ? Math.floor((Date.now() - new Date(iso)) / 86400000) : 9999; }
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function jparse(v) { try { return JSON.parse(v); } catch { return null; } }
// Coach-messaging helpers. A session "needs reply" if the athlete left any note
// (the finish-session note OR a per-exercise note inside the summary) and the
// coach hasn't acted on it yet (coach_status still 'new').
function ctxLabel(ctx) { const m = String(ctx || '').match(/^session:(\d+):/); return m ? 'Day ' + m[1] : ''; }
function sessionHasNote(s) { return !!((s.day_note && s.day_note.trim()) || (s.summary && /\n\s+Note:/.test(s.summary))); }
function sessionNeedsReply(s) { return sessionHasNote(s) && (s.coach_status || 'new') === 'new'; }
function sessionNoteText(s) {
  if (s.day_note && s.day_note.trim()) return s.day_note.trim();
  const notes = [];

// Strip the "<athlete_id>_" prefix and bucket the blob into something the
// dashboard can render. The app stores progress as many flat keys; we decode
// them back into days + exercise logs here.
function decode(athleteId, blob) {
  const prefix = athleteId + '_';
  const days = {};        // dayNum -> { completed, completedOn, srpe, readiness, note }
  const ex = {};          // exerciseName -> { sets, rpe, note }
  const day = n => (days[n] = days[n] || {});
  const exer = k => (ex[k] = ex[k] || {});

  Object.keys(blob || {}).forEach(fullKey => {
    if (fullKey.indexOf(prefix) !== 0) return;
    const key = fullKey.slice(prefix.length);
    const val = blob[fullKey];
    let m;
    if ((m = key.match(/^completed_d(\d+)$/)))   { const d = day(m[1]); d.completed = true; d.completedOn = val; }
    else if ((m = key.match(/^srpe_(\d+)$/)))    { day(m[1]).srpe = val; }
    else if ((m = key.match(/^readiness_(\d+)$/))) { day(m[1]).readiness = jparse(val); }
    else if ((m = key.match(/^daynote_(\d+)$/))) { day(m[1]).note = val; }
    else if ((m = key.match(/^setlog_(.+)$/)))   { exer(m[1]).sets = jparse(val) || []; }
    else if ((m = key.match(/^note_(.+)$/)))     { exer(m[1]).note = val; }
    else if ((m = key.match(/^rpe_(.+)$/)))      { exer(m[1]).rpe = val; }
    // (timer_, sent_d, prog_state, dark_mode → ignored)
  });
  return { days, ex };
}
function unslug(s) { return s.replace(/_/g, ' '); }

// --- training-load + readiness analytics ------------------------------------
// All derived from session_history. Load uses Foster's session-RPE method
// (load = session RPE × duration in minutes). ACWR = acute (7-day) ÷ chronic
// (28-day weekly average). Readiness uses the composite each athlete self-reports.
// Colours are hex (not CSS vars) because var() isn't reliable inside SVG attrs.
// Roland-Garros palette (hex, not CSS vars — var() isn't reliable inside SVG attrs).
const C = { blue:'#0E4A36', green:'#0E4A36', red:'#C7552F', yellow:'#A8741C', amber:'#A8741C', grey:'#5C5C5C', ink:'#1A1A1A' };
function pDate(iso) { const p = String(iso).split('-'); return new Date(+p[0], (+p[1]) - 1, +p[2]); }
function round1(n) { return Math.round(n * 10) / 10; }

// { 'YYYY-MM-DD' -> total AU that day }
function dailyLoad(sessions) {
  const m = {};
  sessions.forEach(s => {
    if (s.session_rpe != null && s.duration_min != null && s.completed_on)
      m[s.completed_on] = (m[s.completed_on] || 0) + Number(s.session_rpe) * Number(s.duration_min);
  });
  return m;
}
// Rolling-average ACWR as of `ref` (default today). `enough` gates the display
// so a thin history never produces a misleading ratio.
function computeAcwr(daily, ref) {
  const keys = Object.keys(daily);
  if (!keys.length) return { ratio: null, acute: 0, chronicWeekly: 0, enough: false, spanDays: 0 };
  const r = ref || new Date();
  const refMid = new Date(r.getFullYear(), r.getMonth(), r.getDate());
  let acute = 0, chronic = 0, earliest = null;
  keys.forEach(iso => {
    const d = pDate(iso), diff = Math.floor((refMid - d) / 86400000);
    if (earliest === null || d < earliest) earliest = d;
    if (diff >= 0 && diff < 7)  acute   += daily[iso];
    if (diff >= 0 && diff < 28) chronic += daily[iso];
  });
  const chronicWeekly = chronic / 4;
  const spanDays = earliest !== null ? Math.floor((refMid - earliest) / 86400000) : 0;
  return { ratio: chronicWeekly > 0 ? acute / chronicWeekly : null,
           acute, chronicWeekly, enough: spanDays >= 14 && chronicWeekly > 0, spanDays };
}
function acwrZone(r) {
  if (r == null) return { label: '—', cls: '' };
  if (r > 1.5)  return { label: 'High load', cls: 'red' };
  if (r > 1.3)  return { label: 'Climbing',  cls: 'amber' };
  if (r >= 0.8) return { label: 'Optimal',   cls: 'green' };
  return { label: 'Low load', cls: 'amber' };
}
// Composite readiness over time (ascending) + baseline/latest.
function readinessSeries(sessions) {
  return sessions
    .filter(s => s.readiness && !s.readiness.skipped && s.readiness.composite != null)
    .map(s => ({ iso: s.completed_on, v: Number(s.readiness.composite) }))
    .filter(p => p.iso && !isNaN(p.v))
    .sort((a, b) => a.iso.localeCompare(b.iso));
}
function readinessStats(series) {
  if (!series.length) return null;
  const v = series.map(p => p.v), base = v.reduce((a, b) => a + b, 0) / v.length;
  const latest = v[v.length - 1];
  return { baseline: base, latest, delta: latest - base, n: v.length };
}
// Weekly buckets (Mon-start) of load for the last `weeks` weeks, oldest → newest.
function weeklyLoad(daily, weeks, ref) {
  const r = ref || new Date();
  const monday = new Date(r.getFullYear(), r.getMonth(), r.getDate());
  monday.setDate(monday.getDate() - ((monday.getDay() + 6) % 7));   // back to this week's Monday
  const buckets = [];
  for (let i = weeks - 1; i >= 0; i--) { const start = new Date(monday); start.setDate(start.getDate() - i * 7); buckets.push({ start, load: 0 }); }
  Object.keys(daily).forEach(iso => {
    const d = pDate(iso);
    for (let i = buckets.length - 1; i >= 0; i--) { if (d >= buckets[i].start) { buckets[i].load += daily[iso]; break; } }
  });
  return buckets;
}
function isPartialStatus(s) { return String(s || '').toLowerCase().indexOf('partial') === 0; }
// Adherence: sessions completed vs prescribed over the last `weeks` weeks.
// Prescribed/week = the athlete's program day count (workouts.days.length).
// The window shrinks for athletes who started <`weeks` ago, so a fresh athlete
// isn't penalised for weeks before they began. Partials count as half a session.
function adherence(sessions, daysPerWeek, weeks, ref) {
  weeks = weeks || 4;
  if (!daysPerWeek) return null;                       // no program → can't measure
  let earliest = null;
  sessions.forEach(s => { if (s.completed_on) { const d = pDate(s.completed_on); if (!earliest || d < earliest) earliest = d; } });
  const r = ref || new Date();
  const refMid = new Date(r.getFullYear(), r.getMonth(), r.getDate());
  if (!earliest) return null;                          // never trained → don't measure (avoids a false 0%)
  const daysActive = Math.floor((refMid - earliest) / 86400000) + 1;
  const effWeeks = Math.max(1, Math.min(weeks, Math.ceil(daysActive / 7)));
  const start = new Date(refMid); start.setDate(start.getDate() - (effWeeks * 7 - 1));
  let done = 0;
  sessions.forEach(s => { if (!s.completed_on) return; const d = pDate(s.completed_on);
    if (d >= start && d <= refMid) done += isPartialStatus(s.status) ? 0.5 : 1; });
  const expected = daysPerWeek * effWeeks;
  return { done, expected, pct: expected > 0 ? Math.round((done / expected) * 100) : null, weeks: effWeeks, perWeek: daysPerWeek };
}
function adhCls(pct) { if (pct == null) return ''; if (pct >= 85) return 'green'; if (pct >= 60) return 'amber'; return 'red'; }

// Bundle every metric for one athlete from their session rows.
function athleteMetrics(sessions, lastActive, daysPerWeek) {
  const daily = dailyLoad(sessions);
  const rser  = readinessSeries(sessions);
  const loadPts = sessions
    .filter(s => s.session_rpe != null && s.duration_min != null && s.completed_on)
    .slice().sort((a, b) => String(a.completed_on).localeCompare(String(b.completed_on)))
    .map(s => Number(s.session_rpe) * Number(s.duration_min));
  const byRecent = sessions.slice().sort((a, b) => String(b.completed_on).localeCompare(String(a.completed_on)));
  const lastPartial = byRecent.length ? isPartialStatus(byRecent[0].status) : false;
  return { daily, acwr: computeAcwr(daily), rser, readiness: readinessStats(rser),
           adherence: adherence(sessions, daysPerWeek), loadPts, lastPartial,
           daysIdle: daysSince(lastActive), neverActive: !lastActive && !sessions.length };
}
// Triage signals → { tier:'red'|'amber'|'ok', flags:[{sev,msg}] }
function triage(m) {
  const flags = [], rank = { red: 2, amber: 1, ok: 0 }; let tier = 'ok';
  const add = (sev, msg) => { flags.push({ sev, msg }); if (rank[sev] > rank[tier]) tier = sev; };
  if (m.neverActive) { /* onboarded but hasn't trained yet — no idle/load/adherence flags */ }
  else if (m.daysIdle > 14)       add('red', 'Silent — ' + m.daysIdle + ' days, no training');
  else if (m.daysIdle > QUIET_DAYS) add('amber', 'Quiet — ' + m.daysIdle + ' days idle');
  if (m.acwr.enough && m.acwr.ratio != null) {
    if (m.acwr.ratio > 1.5)      add('red',   'Load spike — ACWR ' + round1(m.acwr.ratio));
    else if (m.acwr.ratio > 1.3) add('amber', 'Load climbing — ACWR ' + round1(m.acwr.ratio));
    else if (m.acwr.ratio < 0.8) add('amber', 'Detraining — ACWR ' + round1(m.acwr.ratio));
  }
  if (m.readiness) {
    if (m.readiness.delta <= -1)        add('red',   'Readiness ↓ ' + round1(m.readiness.latest) + ' vs ' + round1(m.readiness.baseline) + ' usual');
    else if (m.readiness.delta <= -0.5) add('amber', 'Readiness dipping');
  }
  if (m.adherence && m.adherence.pct != null) {
    if (m.adherence.pct < 50)      add('red',   'Low adherence — ' + m.adherence.pct + '% of plan');
    else if (m.adherence.pct < 70) add('amber', 'Adherence slipping — ' + m.adherence.pct + '%');
  }
  if (m.lastPartial) add('amber', 'Last session left partial');
  flags.sort((a, b) => rank[b.sev] - rank[a.sev]);
  return { tier, flags };
}

// --- tiny inline-SVG charts (no dependency) ---------------------------------
function sparkline(values, color, w, h) {
  w = w || 400; h = h || 40;   // wide aspect so the full-width SVG stays a compact strip
  const pts = values.filter(v => v != null && !isNaN(v));
  if (pts.length < 2) return '<span class="muted" style="font-size:11px">not enough data yet</span>';
  const min = Math.min(...pts), max = Math.max(...pts), rng = (max - min) || 1;
  const X = i => (i / (pts.length - 1)) * (w - 2) + 1;
  const Y = v => h - 2 - ((v - min) / rng) * (h - 4);
  const d = pts.map((v, i) => (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(v).toFixed(1)).join(' ');
  const lx = X(pts.length - 1), ly = Y(pts[pts.length - 1]);
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.4" fill="${color}"/></svg>`;
}
function barsSVG(buckets, color) {
  const w = 320, h = 96, base = h - 4, top = 8, n = buckets.length || 1;
  const max = Math.max(1, ...buckets.map(b => b.load)), slot = w / n;
  const bars = buckets.map((b, i) => {
    const bh = (b.load / max) * (base - top), x = i * slot + slot * 0.18, bw = slot * 0.64, y = base - bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, bh).toFixed(1)}" rx="2" fill="${color}" opacity="${b.load ? 0.85 : 0.18}"></rect>`;
  }).join('');
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}">${bars}</svg>`;
}
function lineSVG(series, opts) {
  opts = opts || {};
  const w = 320, h = 96, top = 10, bot = h - 14, left = 4, right = w - 4;
  const yMin = opts.yMin != null ? opts.yMin : 1, yMax = opts.yMax != null ? opts.yMax : 5;
  const X = i => series.length > 1 ? left + (i / (series.length - 1)) * (right - left) : (left + right) / 2;
  const Y = v => bot - ((v - yMin) / ((yMax - yMin) || 1)) * (bot - top);
  const d = series.map((p, i) => (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(p.v).toFixed(1)).join(' ');
  const dots = series.map((p, i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="2.2" fill="${opts.color}"/>`).join('');
  let baseLine = '';
  if (opts.baseline != null) { const by = Y(opts.baseline).toFixed(1); baseLine = `<line x1="${left}" y1="${by}" x2="${right}" y2="${by}" stroke="${C.grey}" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>`; }
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}">${baseLine}<path d="${d}" fill="none" stroke="${opts.color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`;
}
// The two-up charts shown at the top of an athlete's detail view.
function renderCharts(m) {
  const az = acwrZone(m.acwr.enough ? m.acwr.ratio : null);
  const azColor = az.cls === 'red' ? 'var(--red)' : az.cls === 'amber' ? 'var(--amber)' : az.cls === 'green' ? 'var(--green)' : 'var(--ink)';
  const hasLoad = Object.keys(m.daily).length > 0;
  const loadCard = `<div class="chart-card">
    <h4>Training load</h4>
    ${m.acwr.enough && m.acwr.ratio != null
      ? `<div class="chart-big" style="color:${azColor}">${round1(m.acwr.ratio)}<span style="font-size:13px;color:var(--grey);margin-left:6px">ACWR · ${az.label}</span></div>
         <div class="chart-sub">${Math.round(m.acwr.acute)} AU this week vs ${Math.round(m.acwr.chronicWeekly)} AU weekly average</div>`
      : `<div class="chart-big" style="font-size:18px;color:var(--grey)">Building baseline</div>
         <div class="chart-sub">Needs ~2 weeks of sessions (with duration logged) before the acute:chronic ratio means anything.</div>`}
    ${hasLoad
      ? barsSVG(weeklyLoad(m.daily, 8), C.blue) + `<div class="chart-legend">Weekly load (AU = session RPE × minutes), last 8 weeks</div>`
      : `<p class="muted" style="margin-top:10px">No load data yet — needs sessions with a logged duration.</p>`}
  </div>`;

  const r = m.readiness;
  const rColor = !r ? 'var(--grey)' : r.delta <= -1 ? 'var(--red)' : r.delta <= -0.5 ? 'var(--amber)' : 'var(--green)';
  const readyCard = `<div class="chart-card">
    <h4>Readiness</h4>
    ${r
      ? `<div class="chart-big" style="color:${rColor}">${round1(r.latest)}<span style="font-size:13px;color:var(--grey);margin-left:4px">/5 · usual ${round1(r.baseline)}</span></div>
         <div class="chart-sub">${r.delta >= 0 ? '+' : ''}${round1(r.delta)} vs their ${r.n}-session average</div>
         ${lineSVG(m.rser, { color: C.green, baseline: r.baseline, yMin: 1, yMax: 5 })}
         <div class="chart-legend">Composite readiness per session (1–5, higher = fresher) · dashed line = baseline</div>`
      : `<p class="muted" style="margin-top:10px">No readiness check-ins yet.</p>`}
  </div>`;

  const adh = m.adherence;
  const adhColor = !adh || adh.pct == null ? 'var(--grey)'
    : adh.pct >= 85 ? 'var(--green)' : adh.pct >= 60 ? 'var(--amber)' : 'var(--red)';
  const adhDone = adh ? (adh.done % 1 ? adh.done.toFixed(1) : adh.done) : 0;
  const adhCard = `<div class="chart-card">
    <h4>Adherence</h4>
    ${adh && adh.pct != null
      ? `<div class="chart-big" style="color:${adhColor}">${adh.pct}%<span style="font-size:13px;color:var(--grey);margin-left:4px">last ${adh.weeks} wk${adh.weeks === 1 ? '' : 's'}</span></div>
         <div class="chart-sub">${adhDone} of ${adh.expected} planned sessions completed</div>
         <div class="bar"><div class="bar-fill" style="width:${Math.min(adh.pct, 100)}%;background:${adhColor}"></div></div>
         <div class="chart-legend">Planned = ${adh.perWeek} session${adh.perWeek === 1 ? '' : 's'}/week (from their program) × ${adh.weeks} wk${adh.weeks === 1 ? '' : 's'}</div>`
      : `<p class="muted" style="margin-top:10px">Not enough data yet — needs a program file and at least one finished session.</p>`}
  </div>`;

  return `<div class="charts">${loadCard}${readyCard}${adhCard}</div>`;
}

// --- overview (triage) ------------------------------------------------------
// One card per athlete, grouped by athlete_id across BOTH tables, then grouped
// into attention tiers. Full session rows are pulled so the front page can show
// load/readiness trends and flag who needs the coach right now.
let _overview = [];
async function loadOverview() {
  $('content').innerHTML = '<div class="loading">Loading…</div>';
  const [progRes, histRes, keys, msgRes] = await Promise.all([
    sb.from('athlete_progress').select('*'),
    sb.from('session_history').select('athlete_id, athlete_name, day, completed_on, status, session_rpe, duration_min, readiness, updated_at, coach_status, day_note, summary'),
    fetchKeys(),
    sb.from('messages').select('athlete_id, sender, read_by_coach')
  ]);
  if (progRes.error && histRes.error) {
    $('content').innerHTML = `<p class="muted">Could not load data: ${esc((progRes.error || histRes.error).message)}</p>`; return;
  }
  const progRows = progRes.data || [];
  const histRows = histRes.data || [];
  const msgRows = (msgRes && msgRes.data) || [];
  const unreadMsg = {};
  msgRows.forEach(r => { if (r.sender === 'athlete' && !r.read_by_coach) unreadMsg[r.athlete_id] = (unreadMsg[r.athlete_id] || 0) + 1; });
  _chatUnreadTotal = Object.values(unreadMsg).reduce((a, b) => a + b, 0);
  renderTabbar('athletes');
  if (!progRows.length && !histRows.length && !Object.keys(keys).length) {
    $('content').innerHTML = '<p class="muted">No athletes yet. Create a secure link with “+ New secure link”, or wait for an athlete to start training.</p>'; return;
  }

  // Group everything by athlete.
  const map = {};
  const get = (id) => (map[id] = map[id] || { id, name: id, finished: 0, lastActive: null, sessions: [] });
  const touch = (a, name, when) => {
    if (name) a.name = name;
    if (when && (!a.lastActive || when > a.lastActive)) a.lastActive = when;
  };
  progRows.forEach(row => {
    const a = get(row.athlete_id);
    touch(a, row.athlete_name, row.updated_at);
  });
  histRows.forEach(row => {
    const a = get(row.athlete_id);
    touch(a, row.athlete_name, row.updated_at);
    a.finished++;
    a.sessions.push(row);
  });
  // Every athlete you've issued a secure link to appears too — so you can view
  // their program the moment they're onboarded, before they ever open the app.
  Object.keys(keys).forEach(id => get(id));

  // Pull each athlete's program file (in parallel) for their sessions/week (for
  // adherence) and their name. Missing files just disable adherence.
  const ids = Object.keys(map);
  const programs = await Promise.all(ids.map(id =>
    fetch(`data/${id}.json`).then(r => r.ok ? r.json() : null).catch(() => null)));
  const perWeek = {};
  ids.forEach((id, i) => {
    const p = programs[i], a = map[id];
    perWeek[id] = (p && p.workouts && p.workouts.days && p.workouts.days.length) || 0;
    if (p && p.athlete && a.name === a.id) {
      const nm = [p.athlete.firstName, p.athlete.lastName].filter(Boolean).join(' ');
      if (nm) a.name = nm;
    }
  });

  _overview = Object.values(map).map(a => {
    const metrics = athleteMetrics(a.sessions, a.lastActive, perWeek[a.id]);
    const t = triage(metrics);
    const toReply = a.sessions.filter(sessionNeedsReply).length + (unreadMsg[a.id] || 0);
    let tier = t.tier;
    if (toReply > 0 && tier === 'ok') tier = 'amber';   // a waiting reply escapes the collapsed "on track" group
    return Object.assign(a, { metrics, tier, flags: t.flags, isProtected: !!keys[a.id], toReply });
  });

  $('content').innerHTML = `
    <div class="controls">
      <input id="searchBox" placeholder="Search athletes…" oninput="renderCards()">
      <select id="sortSel" onchange="renderCards()">
        <option value="attention">Sort: needs attention</option>
        <option value="recent">Sort: recently active</option>
        <option value="name">Sort: name</option>
      </select>
      <button class="btn primary sm" onclick="newAthleteLink()">+ New secure link</button>
    </div>
    <div id="cards"></div>`;
  renderCards();
}

function athleteCard(a) {
  const m = a.metrics;
  const az = acwrZone(m.acwr.enough ? m.acwr.ratio : null);
  const acwrPill = (m.acwr.enough && m.acwr.ratio != null)
    ? `<span class="zpill ${az.cls}">ACWR ${round1(m.acwr.ratio)} · ${az.label}</span>`
    : `<span class="zpill">ACWR · building</span>`;
  const rPill = m.readiness
    ? `<span class="zpill ${m.readiness.delta <= -1 ? 'red' : (m.readiness.delta <= -0.5 ? 'amber' : 'green')}">Readiness ${round1(m.readiness.latest)}/5</span>`
    : '';
  const adhPill = (m.adherence && m.adherence.pct != null)
    ? `<span class="zpill ${adhCls(m.adherence.pct)}">Adherence ${m.adherence.pct}%</span>`
    : '';
  const replyChip = a.toReply > 0
    ? `<span class="zpill reply">${a.toReply} to reply</span>` : '';
  const alertCls = a.tier === 'red' ? 'alert-red' : (a.tier === 'amber' ? 'alert-amber' : '');
  const lockPill = `<span class="zpill ${a.isProtected ? 'green' : 'amber'}" title="${a.isProtected ? 'Secure link' : 'Legacy link'}">${a.isProtected ? '🔒' : '⚠'}</span>`;
  const head = `<div class="card-top"><div class="name">${esc(a.name)}</div>${lockPill}</div>`;
  // Onboarded but hasn't trained yet — a calm "Not started" card you can still open.
  if (m.neverActive) {
    return `<div class="card" onclick="loadAthlete('${esc(a.id)}')">
      ${head}
      <div class="meta">not started yet · view their program</div>
      <div class="zrow"><span class="zpill">Not started</span></div>
    </div>`;
  }
  const flagsHtml = a.flags.length
    ? `<div class="flags">${a.flags.slice(0, 3).map(f => `<div class="flag"><span class="fdot" style="background:${f.sev === 'red' ? C.red : C.yellow}"></span>${esc(f.msg)}</div>`).join('')}</div>`
    : '';
  return `<div class="card ${alertCls}" onclick="loadAthlete('${esc(a.id)}')">
    ${head}
    <div class="meta">last active ${timeAgo(a.lastActive)} · ${a.finished} session${a.finished === 1 ? '' : 's'}</div>
    <div class="spark">${sparkline(m.loadPts, C.blue)}</div>
    <div class="zrow">${replyChip}${acwrPill}${rPill}${adhPill}</div>
    ${flagsHtml}
  </div>`;
}

// Filter + sort + (when sorting by attention) group into tiers. Re-renders only
// the cards container so the search box keeps focus as you type.
function renderCards() {
  const q = (($('searchBox') || {}).value || '').toLowerCase();
  const sort = (($('sortSel') || {}).value) || 'attention';
  const rank = { red: 2, amber: 1, ok: 0 };
  let list = _overview.filter(a => a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q));
  if (sort === 'name')        list.sort((a, b) => a.name.localeCompare(b.name));
  else if (sort === 'recent') list.sort((a, b) => (b.lastActive || '').localeCompare(a.lastActive || ''));
  else                        list.sort((a, b) => (rank[b.tier] - rank[a.tier]) || ((b.toReply || 0) - (a.toReply || 0)) || (b.lastActive || '').localeCompare(a.lastActive || ''));

  if (!list.length) { $('cards').innerHTML = `<p class="muted">No athletes match “${esc(q)}”.</p>`; return; }

  if (sort === 'attention') {
    const groups = [['red', 'Needs attention', 'red'], ['amber', 'Watch', 'amber'], ['ok', 'On track', 'green']];
    $('cards').innerHTML = groups.map(([key, label, dot]) => {
      const g = list.filter(a => a.tier === key);
      if (!g.length) return '';
      const cards = `<div class="grid">${g.map(athleteCard).join('')}</div>`;
      if (key === 'ok')
        return `<details class="tier tier-ok"><summary class="tier-head"><span class="dot ${dot}"></span>${label} (${g.length}) · tap to show</summary>${cards}</details>`;
      return `<div class="tier"><div class="tier-head"><span class="dot ${dot}"></span>${label} (${g.length})</div>${cards}</div>`;
    }).join('');
  } else {
    $('cards').innerHTML = `<div class="grid">${list.map(athleteCard).join('')}</div>`;
  }
}
window.renderCards = renderCards;

// --- tab bar (Athletes | Chats) ---------------------------------------------
let _chatUnreadTotal = 0;
function renderTabbar(active) {
